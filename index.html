function annNav(dir) {
  const n = annIdx + dir;
  if (n >= 0 && n < annItems.length) annLoad(n);
}

function annLoad(idx) {
  annIdx = idx;
  const item = annItems[idx];
  const sha = item.sha;
  const ann = annGet(sha);

  document.getElementById('ann-img').src = BASE_URL + item.img_url;
  document.getElementById('ann-img').alt = sha;
  document.getElementById('ann-meta-code').textContent = `${idx + 1} / ${annItems.length}`;
  annUpdateMetaName(item, ann.human_secondary || []);
  annBadge(ann.status || 'unconfirmed');

  const done = annCountDone();
  document.getElementById('ann-counter').textContent = `${idx + 1} / ${annItems.length}  ·  ${done} annotated`;
  document.getElementById('ann-pfill').style.width = `${(done / annItems.length * 100).toFixed(1)}%`;

  annBuildPanel(item, ann);
  // Drawing overlay
  annDrawLoadForItem(sha);
  // Resize canvas after image may have changed size
  const annImg = document.getElementById('ann-img');
  annImg.onload = () => { annDrawResizeCanvas(); };
  if (annImg && annImg.complete) annDrawResizeCanvas();
}

function annBuildPanel(item, ann) {
  const panel = document.getElementById('ann-panel');
  if (READONLY) panel.classList.add('ann-readonly');

  // Prefill codes that exist as actual chips (leaf codes in ANN_TAXONOMY)
  const prefillSet = new Set(item.prefill_labels || []);
  const isLeaf = code => {
    const g = code.substring(0, 3);
    return !!(ANN_TAXONOMY[g] && ANN_TAXONOMY[g][code]);
  };

  // WHERE (K-B) — single-select; prefill K-B codes pre-selected + locked
  const whereTags = taxEntries('K-B').map(([code]) => {
    const locked  = prefillSet.has(code) && isLeaf(code);
    const sel     = (ann.human_where.includes(code) || locked) ? ' sel-where' : '';
    const lock    = locked ? ' prefill-lock' : '';
    return `<span class="ann-tag${sel}${lock}" data-code="${code}">${code}</span>`;
  }).join('');

  // KELLOGG CATEGORY — tabbed, multi-select
  // prefill leaf codes: pre-selected + locked; user can freely add others
  const catTabs = ANN_NON_B.map((l, i) =>
    `<button class="ann-macro-tab${i===0?' active':''}" data-letter="${l}" onclick="annTab(this,'secondary')">${l}. ${ANN_GROUP_NAMES[l]}</button>`
  ).join('');
  const catGroups = ANN_NON_B.map((l, i) => {
    const tags = taxEntries(`K-${l}`).map(([code]) => {
      const locked = prefillSet.has(code) && isLeaf(code);
      const sel    = (ann.human_secondary.includes(code) || locked) ? ' sel-secondary' : '';
      const lock   = locked ? ' prefill-lock' : '';
      return `<span class="ann-tag${sel}${lock}" data-code="${code}">${code}</span>`;
    }).join('');
    return `<div class="ann-tags" id="ann-sg-${l}" style="display:${i===0?'flex':'none'};flex-wrap:wrap;gap:0.28rem;">${tags}</div>`;
  }).join('');

  // MAURER T-C — multi-select (T-CBA = Placement Pattern is captured by the placement brush, not a manual tag)
  const maurerTags = MAURER_TC.filter(m => m.code !== 'T-CBA').map(m => {
    const sel = (ann.maurer_tc || []).includes(m.code) ? ' sel-maurer' : '';
    return `<span class="ann-tag${sel}" data-code="${m.code}" data-name="${m.name}" data-desc="${m.desc}">${m.code}</span>`;
  }).join('');

  // Prefill info row
  const prefillRow = item.prefill_labels.length
    ? `<div class="ann-section" style="background:var(--c-bg-warm);">
         <div class="ann-section-label">PREFILL · Original label(s)<span class="ann-hint">from the archive, read-only</span></div>
         <div class="ann-tags">${item.prefill_labels.map(c => `<span class="ann-tag" style="opacity:0.7;cursor:default;" title="${(ANN_INDEX_DATA.label_names||{})[c]||''}">${c}</span>`).join('')}</div>
       </div>` : '';

  panel.innerHTML = `
    <div class="ann-labeling-banner" id="ann-labeling-banner"></div>
    ${prefillRow}
    <div class="ann-section">
      <div class="ann-section-label">WHERE · Placement Pattern<span class="ann-hint">single choice — K-B</span></div>
      <div class="ann-tags" id="ann-where-tags">${whereTags}</div>
    </div>
    <div class="ann-section">
      <div class="ann-section-label">KELLOGG CATEGORY<span class="ann-hint">dashed = from archive · click to add more</span></div>
      <div class="ann-macro-tabs" id="ann-secondary-tabs">${catTabs}</div>
      <div id="ann-secondary-groups">${catGroups}</div>
    </div>
    <div class="ann-section">
      <div class="ann-section-label">MAURER T–C · Spatial Arrangements<span class="ann-hint">multiple</span></div>
      <div class="ann-tags" id="ann-maurer-tags">${maurerTags}</div>
    </div>
    <div class="ann-save-bar"${READONLY ? ' style="display:none"' : ''}>
      <button class="ann-btn ann-primary" onclick="annSave()">Save</button>
      <button class="ann-btn" onclick="annClear()">Clear</button>
      <span class="ann-save-feedback" id="ann-save-fb"></span>
    </div>
  `;

  annAttach('ann-where-tags', 'sel-where', false);
  ANN_NON_B.forEach(l => annAttach(`ann-sg-${l}`, 'sel-secondary', true));
  annAttach('ann-maurer-tags', 'sel-maurer', true);

  // Hover tooltips — active in both readonly and editable mode
  ['ann-where-tags', ...ANN_NON_B.map(l => `ann-sg-${l}`), 'ann-maurer-tags']
    .forEach(id => { const el = document.getElementById(id); if (el) annAddHoverHandlers(el); });
}

function annAttach(id, selClass, multi) {
  if (READONLY) return;
  const container = document.getElementById(id);
  if (!container) return;
  container.querySelectorAll('.ann-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      if (tag.classList.contains('prefill-lock')) return;
      const code = tag.dataset.code;
      // Placement mode: only Maurer T-C tags are interactive
      if (saSoftBrush && code && !code.startsWith('K-B')) return;
      // If a spatial annotation is selected, assign or toggle label
      if (saSelectedId && code) {
        const isMaurer = code.startsWith('T-C');
        const isWhere  = code.startsWith('K-B');
        const tagSelClass = isMaurer ? 'sel-maurer' : isWhere ? 'sel-where' : 'sel-secondary';
        const a = saAnnotations.find(x => x.id === saSelectedId);
        if (a && a.label === code) {
          // Already labeled with this code — deselect
          saUnlinkTagForAnnotation(a);
          a.label = null; a.label_type = null;
          tag.classList.remove(tagSelClass);
          saRepaint(); saRenderList(); saSyncStore(); saUpdateBanner();
        } else {
          saAssignLabel(code, isMaurer ? 'maurer' : isWhere ? 'where' : 'kellogg');
          tag.style.outline = '2px solid #C0392B';
          setTimeout(() => tag.style.outline = '', 800);
        }
        return; // don't toggle image-level annotation
      }
      // Normal image-level annotation
      if (multi) {
        tag.classList.toggle(selClass);
        // Sync metadata for secondary Kellogg tags
        const item = annItems[annIdx];
        if (item) {
          const store = annStore();
          const rec = store[item.sha] || {};
          const allSel = Array.from(document.querySelectorAll(`#${id} .ann-tag.${selClass}`)).map(t => t.dataset.code).filter(Boolean);
          rec.human_secondary = allSel;
          store[item.sha] = rec;
          localStorage.setItem(ANN_KEY, JSON.stringify(store));
          annUpdateMetaName(item, rec.human_secondary || []);
        }
      } else {
        document.getElementById('ann-panel').querySelectorAll(`.ann-tag.${selClass}`).forEach(t => t.classList.remove(selClass));
        tag.classList.add(selClass);
      }
    });
  });
}

function annTab(btn, type) {
  const letter = btn.dataset.letter;
  const tabsId = type === 'primary' ? 'ann-primary-tabs' : 'ann-secondary-tabs';
  document.getElementById(tabsId).querySelectorAll('.ann-macro-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ANN_NON_B.forEach(l => {
    const el = document.getElementById(`ann-${type==='primary'?'pg':'sg'}-${l}`);
    if (el) el.style.display = l === letter ? 'flex' : 'none';
  });
}

function annSelCodes(selector) {
  return Array.from(document.querySelectorAll(selector)).map(t => t.dataset.code).filter(Boolean);
}

function annMetaHTML(prefill, userAdded) {
  const pHtml = prefill.length
    ? `<span class="ann-meta-group ann-meta-archive"><span class="ann-meta-label">catalog</span>${prefill.join(' · ')}</span>`
    : '';
  const userOnly = userAdded.filter(c => !prefill.includes(c));
  const uHtml = userOnly.length
    ? `<span class="ann-meta-group ann-meta-mine"><span class="ann-meta-label">annotated</span>${userOnly.join(' · ')}</span>`
    : '';
  return pHtml + uHtml || '—';
}

function annUpdateMetaName(item, userSecondary) {
  const el = document.getElementById('ann-meta-name');
  if (!el) return;
  el.innerHTML = annMetaHTML(item.prefill_labels || [], userSecondary || []);
}

function annUpdateJsonPreview(sha, item, ann) {
  const el = document.getElementById('ann-json-pre');
  if (!el) return;
  // Summarise spatial annotations (omit raw pts for readability)
  const sa_summary = (ann.spatial_annotations || []).map(a => ({
    id: a.id, label: a.label, label_type: a.label_type,
    strokes: (a.strokes || []).length,
    pts_count: (a.strokes || []).reduce((s, st) => s + (st.pts?.length || 0), 0),
  }));
  const obj = {
    sha,
    img_url:              item.img_url,
    prefill_labels:       item.prefill_labels,
    human_primary:        item.prefill_labels,
    human_where:          ann.human_where          || [],
    human_secondary:      ann.human_secondary      || [],
    maurer_tc:            ann.maurer_tc             || [],
    spatial_annotations:  sa_summary,
    status:               ann.status               || 'unconfirmed',
    updated_at:           ann.updated_at           || null,
  };
  el.textContent = JSON.stringify(obj, null, 2);
}

function annSave() {
  const sha  = annItems[annIdx].sha;
  const item = annItems[annIdx];
  const human_primary   = item.prefill_labels;   // always from archive
  const human_where     = annSelCodes('#ann-where-tags .ann-tag.sel-where');
  // secondary = user-selected codes (exclude locked prefill ones)
  const human_secondary = annSelCodes('#ann-panel .ann-tag.sel-secondary')
    .filter(c => !new Set(item.prefill_labels).has(c));
  const maurer_tc = annSelCodes('#ann-maurer-tags .ann-tag.sel-maurer');
  const spatial_annotations = saAnnotations;
  const hasData = human_where.length || human_secondary.length || maurer_tc.length || spatial_annotations.length;
  const status = hasData ? 'confirmed' : 'unconfirmed';
  annSet(sha, { human_where, human_primary, human_secondary, maurer_tc, spatial_annotations, status });
  annUpdateJsonPreview(sha, item, { human_where, human_primary, human_secondary, maurer_tc, spatial_annotations, status, updated_at: new Date().toISOString() });
  annSetResume(annIdx);
  annBadge(status);
  annUpdateMetaName(item, human_secondary);
  const done = annCountDone();
  document.getElementById('ann-counter').textContent = `${annIdx + 1} / ${annItems.length}  ·  ${done} annotated`;
  document.getElementById('ann-pfill').style.width = `${(done / annItems.length * 100).toFixed(1)}%`;
  const fb = document.getElementById('ann-save-fb');
  fb.textContent = 'Saved ✓';
  setTimeout(() => { if (fb) fb.textContent = ''; }, 2000);
}

function annClear() {
  const item = annItems[annIdx];
  annSet(item.sha, { human_where:[], human_primary: item.prefill_labels, human_secondary:[], maurer_tc:[], status:'unconfirmed' });
  annLoad(annIdx);
}

function annBadge(status) {
  const badge = document.getElementById('ann-status-badge');
  if (!badge) return;
  badge.className = 'ann-status-badge';
  const map = { unconfirmed:'s-unconfirmed', confirmed:'s-confirmed', modified:'s-modified', seeded_unconfirmed:'s-unconfirmed' };
  badge.classList.add(map[status] || 's-unconfirmed');
  badge.textContent = status.replace('seeded_', '');
}

/* ═══════════════════════════════════════════════════════════
   SPATIAL ANNOTATION SYSTEM
   Each stroke is an independent object: { id, pts, size, label, label_type }
   Saving produces "spatial_annotations": [...] in the store,
   ready for training as (image, stroke-mask, label) triplets.
   ═══════════════════════════════════════════════════════════ */

// ── Palette: one color per Kellogg group + maurer
const SA_COLORS = {
  'K-A':'210,60,40', 'K-B':'130,60,180', 'K-C':'40,100,180',
  'K-D':'30,150,80', 'K-E':'190,90,20',  'K-F':'20,155,130',
  'K-G':'40,60,90',  'K-H':'200,140,20', 'K-I':'100,110,120',
  'T':  '92,61,46',  '_':  '150,40,30',
};
function saColor(label) {
  if (!label) return SA_COLORS['_'];
  if (label.startsWith('T')) return SA_COLORS['T'];
  const g = label.substring(0, 3);
  return SA_COLORS[g] || SA_COLORS['_'];
}

// ── State ──
let saAnnotations  = [];   // [{id, strokes:[{pts,size},...], label, label_type}]
let saSelectedId   = null; // id of selected annotation
let saActiveId     = null; // id of annotation currently being drawn into
let saEditingId     = null; // id whose label is being edited
let saDropdownItems = [];   // current dropdown results
let saDropdownFocus = -1;   // focused dropdown row index
let saStaged        = null; // {code, name, type} — selected but not yet confirmed
let saZoom         = 1.0;  // current zoom level
let saDrawActive   = true; // pen mode on
let saSoftBrush    = false; // soft/fuzzy brush for placement patterns
let saHoverId      = null; // id of annotation under mouse cursor
let saShowOverlay  = !READONLY; // in public view: off by default, toggled by button
let saDrawing      = false;
let saDrawLast     = null;
let saDrawCurrent  = null; // annotation being drawn

// ── Flat category list for search ──
let SA_ALL_CATEGORIES = null;
function saGetAllCats() {
  if (SA_ALL_CATEGORIES) return SA_ALL_CATEGORIES;
  SA_ALL_CATEGORIES = [];
  Object.entries(ANN_TAXONOMY).forEach(([, codes]) => {
    Object.entries(codes).forEach(([code, name]) => {
      if (name && !name.startsWith('K-')) SA_ALL_CATEGORIES.push({ code, name, type: 'kellogg' });
    });
  });
  MAURER_TC.forEach(m => SA_ALL_CATEGORIES.push({ code: m.code, name: m.name, type: 'maurer' }));
  return SA_ALL_CATEGORIES;
}

// Convert old flat {pts,size} format to new {strokes:[]} format
function saMigrate(a) {
  if (Array.isArray(a.strokes)) return a;
  return { id: a.id, strokes: [{pts: a.pts || [], size: a.size || 8}], label: a.label || null, label_type: a.label_type || null };
}

function saNextId() {
  return 'sa_' + Date.now() + '_' + Math.floor(Math.random()*1000);
}

// ── Start a new annotation (finalize current, create fresh active) ──
function saNewAnnotation() {
  // Remove trailing empty annotation if it has no strokes
  const cur = saAnnotations.find(a => a.id === saActiveId);
  if (cur && cur.strokes.length === 0) {
    saAnnotations = saAnnotations.filter(a => a.id !== saActiveId);
  }
  const ann = { id: saNextId(), strokes: [], label: null, label_type: null };
  saAnnotations.push(ann);
  saActiveId   = ann.id;
  saSelectedId = ann.id;
  saRepaint();
  saRenderList();
  saUpdateBanner();
}

// ── Toggle draw mode ──
function saToggleDraw() {
  saDrawActive = !saDrawActive;
  const btn  = document.getElementById('ann-draw-toggle');
  const wrap = document.getElementById('ann-img-wrap');
  if (btn)  btn.classList.toggle('active', saDrawActive);
  if (wrap) wrap.style.cursor = saDrawActive ? 'crosshair' : 'pointer';
}

function saSetZoom(z, focalX, focalY) {
  const viewport = document.getElementById('ann-img-viewport');
  const oldZoom  = saZoom;
  saZoom = Math.max(1, Math.min(4, z));
  const pct    = document.getElementById('ann-zoom-pct');
  const slider = document.getElementById('ann-zoom-slider');
  if (pct)    pct.value    = Math.round(saZoom * 100) + '%';
  if (slider) slider.value = Math.round(saZoom * 100);
  // Save scroll before resize so we can restore focal point afterward
  const scrollL = viewport ? viewport.scrollLeft : 0;
  const scrollT  = viewport ? viewport.scrollTop  : 0;
  annDrawResizeCanvas();
  // Adjust scroll so the pixel under focalX/focalY stays stationary
  if (viewport && focalX !== undefined && oldZoom > 0) {
    const scale = saZoom / oldZoom;
    viewport.scrollLeft = (scrollL + focalX) * scale - focalX;
    viewport.scrollTop  = (scrollT  + focalY) * scale - focalY;
  }
}
function saSetZoomCenter(z) {
  const viewport = document.getElementById('ann-img-viewport');
  const cx = viewport ? viewport.clientWidth  / 2 : 0;
  const cy = viewport ? viewport.clientHeight / 2 : 0;
  saSetZoom(z, cx, cy);
}
function saZoomStep(dir) {
  const steps = [1, 1.25, 1.5, 2, 2.5, 3, 4];
  const cur = steps.findIndex(s => s >= saZoom - 0.01);
  const next = dir > 0 ? Math.min(steps.length-1, cur+1) : Math.max(0, (cur < 0 ? steps.length-1 : cur)-1);
  saSetZoomCenter(steps[next]);
}
function saZoomFromInput(val) {
  const n = parseFloat(val.replace('%','').trim());
  if (!isNaN(n)) saSetZoomCenter(n / 100);
}
function saResetZoom() {
  saZoom = 1.0;
  const pct    = document.getElementById('ann-zoom-pct');
  const slider = document.getElementById('ann-zoom-slider');
  if (pct)    pct.value    = '100%';
  if (slider) slider.value = 100;
  annDrawResizeCanvas();
}

// ── Stroke animation (READONLY) ──────────────────────────────────────────────
let saAnimFrame = null;

function saStopAnimation() {
  if (saAnimFrame !== null) { cancelAnimationFrame(saAnimFrame); saAnimFrame = null; }
}

// Draw one stroke statically onto ctx; alpha defaults to 0.45
function saDrawStrokeStatic(ctx, canvas, a, stroke, alpha) {
  alpha = alpha ?? 0.45;
  const rgb = saColor(a.label);
  if (stroke.soft && stroke.placement_area) {
    const pa = stroke.placement_area;
    const cx = pa.cx * canvas.width;
    const cy = pa.cy * canvas.height;
    const rx = Math.max(stroke.size * 2, (pa.w / 2) * canvas.width  + stroke.size);
    const ry = Math.max(stroke.size * 2, (pa.h / 2) * canvas.height + stroke.size);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(rx, ry);
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 1);
    grad.addColorStop(0,   `rgba(${rgb},${(alpha * 0.93).toFixed(2)})`);
    grad.addColorStop(0.5, `rgba(${rgb},${(alpha * 0.56).toFixed(2)})`);
    grad.addColorStop(1,   `rgba(${rgb},0)`);
    ctx.beginPath(); ctx.arc(0, 0, 1, 0, Math.PI * 2);
    ctx.fillStyle = grad; ctx.fill();
    ctx.restore();
    return;
  }
  if (!stroke.pts || !stroke.pts.length) return;
  ctx.filter = stroke.soft ? `blur(${Math.round(stroke.size * 0.4)}px)` : 'none';
  ctx.strokeStyle = `rgba(${rgb},${alpha})`;
  ctx.fillStyle   = `rgba(${rgb},${alpha})`;
  ctx.lineWidth   = stroke.size;
  if (stroke.pts.length === 1) {
    ctx.beginPath();
    ctx.arc(stroke.pts[0].x * canvas.width, stroke.pts[0].y * canvas.height, stroke.size / 2, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(stroke.pts[0].x * canvas.width, stroke.pts[0].y * canvas.height);
    for (const p of stroke.pts.slice(1)) ctx.lineTo(p.x * canvas.width, p.y * canvas.height);
    ctx.stroke();
  }
  ctx.filter = 'none';
}

// Animate the strokes of the given annotation IDs.
// dimBackground: if true, other annotations are nearly invisible (single-label focus mode).
// Ends with saRepaint().
function saAnimateStrokes(ids, dimBackground) {
  saStopAnimation();
  const canvas = document.getElementById('ann-draw-canvas');
  if (!canvas || !canvas.width) { saRepaint(); return; }
  const ctx = canvas.getContext('2d');
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  const toAnimate = ids ? saAnnotations.filter(a => ids.includes(a.id)) : [...saAnnotations];
  if (!toAnimate.length) { saRepaint(); return; }

  // Flat ordered list of {ann, stroke}
  const tasks = [];
  for (const a of toAnimate) for (const s of (a.strokes || [])) tasks.push({ ann: a, stroke: s });

  const animIds = new Set(toAnimate.map(a => a.id));
  let taskIdx = 0, ptIdx = 0;
  const SPEED = 4; // points per rAF frame (~240 pts/sec at 60 fps)
  const bgAlpha = dimBackground ? 0.07 : 0.45; // nearly invisible when focusing on one label

  function drawBackground() {
    // Static background: non-animated annotations (dimmed if focusing) + already-finished tasks
    saAnnotations.forEach(a => {
      if (animIds.has(a.id)) return;
      (a.strokes || []).forEach(s => saDrawStrokeStatic(ctx, canvas, a, s, bgAlpha));
    });
    for (let i = 0; i < taskIdx; i++) saDrawStrokeStatic(ctx, canvas, tasks[i].ann, tasks[i].stroke);
  }

  function frame() {
    if (taskIdx >= tasks.length) { saRepaint(); return; }
    const { ann, stroke } = tasks[taskIdx];
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBackground();

    // Placement area: appear instantly
    if (stroke.soft && stroke.placement_area) {
      saDrawStrokeStatic(ctx, canvas, ann, stroke);
      taskIdx++; ptIdx = 0;
      saAnimFrame = requestAnimationFrame(frame);
      return;
    }
    const pts = stroke.pts || [];
    if (!pts.length) { taskIdx++; ptIdx = 0; saAnimFrame = requestAnimationFrame(frame); return; }

    ptIdx = Math.min(ptIdx + SPEED, pts.length);
    const rgb = saColor(ann.label);
    ctx.filter = stroke.soft ? `blur(${Math.round(stroke.size * 0.4)}px)` : 'none';
    ctx.strokeStyle = `rgba(${rgb},0.6)`;
    ctx.fillStyle   = `rgba(${rgb},0.6)`;
    ctx.lineWidth   = stroke.size;
    const cur = pts.slice(0, ptIdx);
    if (cur.length === 1) {
      ctx.beginPath();
      ctx.arc(cur[0].x * canvas.width, cur[0].y * canvas.height, stroke.size / 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(cur[0].x * canvas.width, cur[0].y * canvas.height);
      for (const p of cur.slice(1)) ctx.lineTo(p.x * canvas.width, p.y * canvas.height);
      ctx.stroke();
    }
    ctx.filter = 'none';
    if (ptIdx >= pts.length) { taskIdx++; ptIdx = 0; }
    saAnimFrame = requestAnimationFrame(frame);
  }
  saAnimFrame = requestAnimationFrame(frame);
}
// ─────────────────────────────────────────────────────────────────────────────

function saToggleOverlay() {
  saShowOverlay = !saShowOverlay;
  const btn = document.getElementById('sa-overlay-btn');
  if (btn) {
    btn.textContent = saShowOverlay ? '◉ Hide spatial labels' : '◎ Show spatial labels';
    btn.classList.toggle('active', saShowOverlay);
  }
  if (saShowOverlay) {
    annDrawResizeCanvas(); // ensure canvas buffer is sized, then calls saRepaint() → static
  } else {
    saStopAnimation();
    saRepaint(); // clears canvas (saShowOverlay = false → early return in saRepaint)
  }
}

function saToggleSoft() {
  saSoftBrush = !saSoftBrush;
  const btn = document.getElementById('ann-soft-btn');
  if (btn) btn.classList.toggle('active', saSoftBrush);
  const panel = document.getElementById('ann-panel');
  if (panel) panel.classList.toggle('ann-placement-mode', saSoftBrush);
  if (saSoftBrush) {
    const slider = document.getElementById('ann-brush-size');
    if (slider && parseInt(slider.value) < 16) slider.value = 20;
  }
}

// ── Remove tag button selection when annotation is deleted ──
function saUnlinkTagForAnnotation(a) {
  if (!a || !a.label) return;
  // Only deselect button if no other annotation still uses this label
  const otherHasLabel = saAnnotations.some(x => x.id !== a.id && x.label === a.label);
  if (otherHasLabel) return;
  const selClass = a.label_type === 'maurer' ? 'sel-maurer' : a.label_type === 'where' ? 'sel-where' : 'sel-secondary';
  const tagEl = document.querySelector(`#ann-panel .ann-tag[data-code="${a.label}"]`);
  if (tagEl && !tagEl.classList.contains('prefill-lock')) {
    tagEl.classList.remove(selClass);
  }
  // Also remove from persistent store
  const item = annItems[annIdx];
  if (!item) return;
  const store = annStore();
  const rec = store[item.sha] || {};
  if (a.label_type === 'maurer') {
    rec.maurer_tc = (rec.maurer_tc || []).filter(c => c !== a.label);
  } else if (a.label_type === 'where') {
    rec.human_where = (rec.human_where || []).filter(c => c !== a.label);
  } else {
    rec.human_secondary = (rec.human_secondary || []).filter(c => c !== a.label);
  }
  store[item.sha] = rec;
  localStorage.setItem(ANN_KEY, JSON.stringify(store));
  annUpdateMetaName(item, rec.human_secondary || []);
}

// ── Delete selected ──
function saDeleteSelected() {
  if (!saSelectedId) return;
  const wasActive = saSelectedId === saActiveId;
  const toDelete = saAnnotations.find(a => a.id === saSelectedId);
  saUnlinkTagForAnnotation(toDelete);
  saAnnotations = saAnnotations.filter(a => a.id !== saSelectedId);
  saSelectedId = null;
  if (wasActive) saActiveId = saAnnotations.length ? saAnnotations[saAnnotations.length - 1].id : null;
  saRepaint();
  saRenderList();
  saSyncStore();
  saUpdateBanner();
}

// ── Select an annotation ──
function saSelect(id) {
  saSelectedId = (saSelectedId === id) ? null : id;
  if (READONLY && saShowOverlay && saSelectedId) {
    saAnimateStrokes([saSelectedId], true); // animate selected, dim others
  } else {
    saRepaint();
  }
  saRenderList();
  saUpdateBanner();
}

// ── Assign a label to the selected annotation ──
function saAssignLabel(label, label_type) {
  const targetId = saEditingId || saSelectedId;
  if (!targetId) return false;
  const a = saAnnotations.find(x => x.id === targetId);
  if (!a) return false;
  a.label      = label;
  a.label_type = label_type;
  saRepaint();
  saRenderList();

  // Also reflect in right-panel tag buttons
  const selClass = label_type === 'maurer' ? 'sel-maurer' : label_type === 'where' ? 'sel-where' : 'sel-secondary';
  const tagEl = document.querySelector(`#ann-panel .ann-tag[data-code="${label}"]`);
  if (tagEl && !tagEl.classList.contains('prefill-lock')) {
    tagEl.classList.add(selClass);
    // Update persistent store for this item so annSave sees it
    const item = annItems[annIdx];
    if (item) {
      const store = annStore();
      const rec = store[item.sha] || {};
      if (label_type === 'maurer') {
        rec.maurer_tc = [...new Set([...(rec.maurer_tc || []), label])];
      } else if (label_type === 'where') {
        rec.human_where = [...new Set([...(rec.human_where || []), label])];
      } else {
        rec.human_secondary = [...new Set([...(rec.human_secondary || []), label])];
      }
      store[item.sha] = rec;
      localStorage.setItem(ANN_KEY, JSON.stringify(store));
      annUpdateMetaName(item, rec.human_secondary || []);
    }
  }

  saSyncStore();
  saUpdateBanner();
  return true;
}

// ── Banner: shows "Labeling stroke N — click a tag" ──
function saUpdateBanner() {
  const banner = document.getElementById('ann-labeling-banner');
  if (!banner) return;
  if (saSelectedId) {
    const a   = saAnnotations.find(x => x.id === saSelectedId);
    const idx = saAnnotations.indexOf(a) + 1;
    if (a?.label) {
      banner.textContent = `↳ Annotation ${idx} labeled as "${a.label}"`;
    } else if (!READONLY) {
      banner.textContent = `↳ Labeling annotation ${idx} — click a tag to assign`;
    } else {
      banner.textContent = `↳ Annotation ${idx} — no label`;
    }
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
    banner.textContent = '';
  }
}

// ── Canvas repaint ──
function saRepaint() {
  const canvas = document.getElementById('ann-draw-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!saShowOverlay) return;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  const hasSelection = !!saSelectedId;

  saAnnotations.forEach(a => {
    const isSelected = a.id === saSelectedId;
    const isActive   = a.id === saActiveId;
    const isHovered  = a.id === saHoverId;
    const rgb  = saColor(a.label);
    const alpha = (isSelected || isActive) ? 0.60 : isHovered ? 0.50 : (hasSelection ? 0.15 : 0.28);
    const col   = `rgba(${rgb},${alpha})`;

    if (isHovered && !isSelected && !isActive) {
      ctx.shadowColor = `rgba(${rgb},0.6)`;
      ctx.shadowBlur  = 8;
    } else {
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur  = 0;
    }

    (a.strokes || []).forEach(stroke => {
      // Placement area stroke — render as gradient ellipse (no raw pts)
      if (stroke.soft && stroke.placement_area) {
        const pa = stroke.placement_area;
        const cx = pa.cx * canvas.width;
        const cy = pa.cy * canvas.height;
        const rx = Math.max(stroke.size * 2, (pa.w / 2) * canvas.width  + stroke.size);
        const ry = Math.max(stroke.size * 2, (pa.h / 2) * canvas.height + stroke.size);
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(rx, ry);
        const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 1);
        grad.addColorStop(0,   `rgba(${rgb},${Math.min(1, alpha * 1.5)})`);
        grad.addColorStop(0.5, `rgba(${rgb},${alpha * 0.8})`);
        grad.addColorStop(1,   `rgba(${rgb},0)`);
        ctx.beginPath();
        ctx.arc(0, 0, 1, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.restore();
        return;
      }
      if (stroke.soft) {
        ctx.filter = `blur(${Math.round(stroke.size * 0.4)}px)`;
      } else {
        ctx.filter = 'none';
      }
      ctx.strokeStyle = col;
      ctx.fillStyle   = col;
      ctx.lineWidth   = stroke.size;
      if (!stroke.pts || stroke.pts.length === 0) return;
      if (stroke.pts.length === 1) {
        ctx.beginPath();
        ctx.arc(stroke.pts[0].x * canvas.width, stroke.pts[0].y * canvas.height, stroke.size / 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.moveTo(stroke.pts[0].x * canvas.width, stroke.pts[0].y * canvas.height);
        stroke.pts.slice(1).forEach(p => ctx.lineTo(p.x * canvas.width, p.y * canvas.height));
        ctx.stroke();
      }
    });
    ctx.filter = 'none';

    // Label badge near first point of first stroke
    if (a.label && a.strokes?.length > 0 && a.strokes[0].pts?.length > 0) {
      const px = a.strokes[0].pts[0].x * canvas.width;
      const py = a.strokes[0].pts[0].y * canvas.height;
      ctx.font = 'bold 10px monospace';
      ctx.fillStyle = `rgba(${rgb},${isSelected || isActive ? 0.95 : 0.55})`;
      ctx.fillText(a.label, px + 4, py - 4);
    }
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur  = 0;
  });

  // Live stroke being drawn
  if (saDrawCurrent && saDrawCurrent.pts.length > 0) {
    const liveColor = saActiveId ? `rgba(${saColor(saAnnotations.find(a=>a.id===saActiveId)?.label)},0.50)` : 'rgba(192,57,43,0.50)';
    ctx.strokeStyle = liveColor;
    ctx.fillStyle   = liveColor;
    if (saDrawCurrent.soft) ctx.filter = `blur(${Math.round(saDrawCurrent.size * 0.4)}px)`;
    else ctx.filter = 'none';
    ctx.lineWidth   = saDrawCurrent.size;
    if (saDrawCurrent.pts.length === 1) {
      ctx.beginPath();
      ctx.arc(saDrawCurrent.pts[0].x * canvas.width, saDrawCurrent.pts[0].y * canvas.height, saDrawCurrent.size / 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(saDrawCurrent.pts[0].x * canvas.width, saDrawCurrent.pts[0].y * canvas.height);
      saDrawCurrent.pts.slice(1).forEach(p => ctx.lineTo(p.x * canvas.width, p.y * canvas.height));
      ctx.stroke();
    }
    ctx.filter = 'none';
  }
}

// ── Annotation list (sidebar of image panel) ──
function saRenderList() {
  const list = document.getElementById('sa-list');
  if (!list) return;
  if (!saAnnotations.length) { list.innerHTML = ''; return; }
  list.innerHTML = '';
  saAnnotations.forEach((a, i) => {
    const rgb = saColor(a.label);
    const sel    = a.id === saSelectedId ? ' selected' : '';
    const actCls = a.id === saActiveId   ? ' sa-active' : '';
    const item = document.createElement('div');
    item.className = 'spatial-ann-item' + sel + actCls;
    item.addEventListener('click', () => saSelect(a.id));

    // dot
    const dot = document.createElement('span');
    dot.className = 'sa-dot';
    dot.style.background = `rgba(${rgb},0.7)`;
    item.appendChild(dot);

    if (a.id === saEditingId) {
      // inline search input + confirm button
      const wrap = document.createElement('span');
      wrap.className = 'sa-label-editor';
      wrap.style.cssText = 'flex:1;display:flex;align-items:center;gap:0.3rem;';

      const inp = document.createElement('input');
      inp.type = 'text';
      inp.id   = 'sa-edit-input';
      inp.className = 'sa-label-input';
      inp.value = a.label || '';
      inp.placeholder = 'search category…';
      inp.autocomplete = 'off';
      inp.style.flex = '1';
      inp.addEventListener('click', e => e.stopPropagation());
      inp.addEventListener('input', e => { saStaged = null; const b = document.getElementById('sa-assign-btn'); if(b) b.style.display='none'; saSearchLabel(e.target.value); });
      inp.addEventListener('keydown', saEditorKeyDown);
      inp.addEventListener('blur', () => setTimeout(() => { if (!saStaged) saCloseEditor(); }, 180));

      const btn = document.createElement('button');
      btn.id = 'sa-assign-btn';
      btn.className = 'sa-assign-btn';
      btn.style.display = saStaged ? '' : 'none';
      btn.textContent = saStaged ? `Assign label: ${saStaged.code}` : 'Assign label';
      btn.addEventListener('mousedown', e => e.preventDefault()); // prevent input blur
      btn.addEventListener('click', e => { e.stopPropagation(); saConfirmLabel(); });

      wrap.appendChild(inp);
      wrap.appendChild(btn);
      item.appendChild(wrap);
    } else {
      const lbl = document.createElement('span');
      lbl.className = 'sa-label' + (a.label ? '' : ' unlabeled');
      const strokeCount = (a.strokes || []).length;
      const activeMarker = a.id === saActiveId ? ' ▶' : '';
      lbl.textContent = `${i+1}. ${a.label || 'unlabeled'}  (${strokeCount}${activeMarker})`;
      lbl.title = 'double-click to assign/change label';
      lbl.addEventListener('dblclick', e => saOpenEditor(a.id, e));
      item.appendChild(lbl);
    }

    if (!READONLY) {
      const del = document.createElement('span');
      del.className = 'sa-del';
      del.textContent = '✕';
      del.addEventListener('click', e => { e.stopPropagation(); saDeleteById(a.id); });
      item.appendChild(del);
    }

    list.appendChild(item);
  });
  // Scroll active or selected item into view
  const activeEl = list.querySelector('.spatial-ann-item.sa-active, .spatial-ann-item.selected');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ── Label editor ──
function saOpenEditor(id, e) {
  if (READONLY) return;
  if (e) e.stopPropagation();
  saEditingId    = id;
  saSelectedId   = id;   // always select, never toggle off
  saDropdownFocus = -1;
  saRepaint();
  saRenderList();
  setTimeout(() => {
    const inp = document.getElementById('sa-edit-input');
    if (inp) { inp.focus(); inp.select(); saSearchLabel(''); }
  }, 0);
}

function saCloseEditor() {
  saEditingId = null;
  saDropdownFocus = -1;
  saStaged = null;
  saHideDropdown();
  saRenderList();
}

function saSearchLabel(q) {
  const allCats = saGetAllCats();
  // In placement mode, restrict to Maurer T-C only
  const cats = saSoftBrush ? allCats.filter(c => c.code.startsWith('K-B')) : allCats;
  const ql = q.toLowerCase().trim();
  saDropdownItems = ql
    ? cats.filter(c => c.code.toLowerCase().includes(ql) || c.name.toLowerCase().includes(ql)).slice(0, 40)
    : cats.slice(0, 40);
  saDropdownFocus = -1;
  saShowDropdown();
}

function saShowDropdown() {
  saHideDropdown();
  const inp = document.getElementById('sa-edit-input');
  if (!inp || !saDropdownItems.length) return;
  const dd = document.createElement('div');
  dd.id = 'sa-dropdown';
  dd.className = 'sa-label-dropdown';
  saDropdownItems.forEach((c, i) => {
    const opt = document.createElement('div');
    opt.className = 'sa-label-option' + (i === saDropdownFocus ? ' sa-focused' : '');
    opt.innerHTML = `<span class="so-code">${c.code}</span><span class="so-name">${c.name}</span>`;
    opt.addEventListener('mousedown', ev => { ev.preventDefault(); saStageLabel(c); });
    dd.appendChild(opt);
  });
  const r = inp.getBoundingClientRect();
  dd.style.top   = (r.bottom + 2) + 'px';
  dd.style.left  = r.left + 'px';
  dd.style.width = Math.max(220, r.width) + 'px';
  document.body.appendChild(dd);
}

function saHideDropdown() {
  const d = document.getElementById('sa-dropdown');
  if (d) d.remove();
}

// Stage a label choice (visible in input + confirm button, not yet committed)
function saStageLabel(cat) {
  saStaged = cat;
  saHideDropdown();
  const inp = document.getElementById('sa-edit-input');
  if (inp) { inp.value = cat.code; inp.focus(); }
  const btn = document.getElementById('sa-assign-btn');
  if (btn) {
    btn.textContent = `Assign label: ${cat.code}`;
    btn.style.display = '';
  }
}

// Commit the staged label to the annotation
function saConfirmLabel() {
  if (!saStaged || !saEditingId) return;
  saAssignLabel(saStaged.code, saStaged.type);
  saStaged = null;
  saCloseEditor();
}

// Pick label directly (keyboard Enter without explicit staging)
function saPickLabel(code, type) {
  if (!saEditingId) return;
  saAssignLabel(code, type);
  saStaged = null;
  saCloseEditor();
}

function saEditorKeyDown(e) {
  const opts = document.querySelectorAll('#sa-dropdown .sa-label-option');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    saDropdownFocus = Math.min(saDropdownFocus + 1, saDropdownItems.length - 1);
    opts.forEach((o, i) => o.classList.toggle('sa-focused', i === saDropdownFocus));
    opts[saDropdownFocus]?.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    saDropdownFocus = Math.max(saDropdownFocus - 1, -1);
    opts.forEach((o, i) => o.classList.toggle('sa-focused', i === saDropdownFocus));
    if (saDropdownFocus >= 0) opts[saDropdownFocus]?.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (saStaged) {
      saConfirmLabel(); // confirm already-staged choice
    } else if (saDropdownFocus >= 0 && saDropdownItems[saDropdownFocus]) {
      const c = saDropdownItems[saDropdownFocus];
      saPickLabel(c.code, c.type); // assign directly via keyboard
    } else if (saDropdownItems[0]) {
      saPickLabel(saDropdownItems[0].code, saDropdownItems[0].type);
    }
  } else if (e.key === 'Escape') {
    if (saStaged) { saStaged = null; const b = document.getElementById('sa-assign-btn'); if (b) b.style.display = 'none'; }
    else { saCloseEditor(); e.stopPropagation(); }
  }
}

function saDeleteById(id) {
  const toDelete = saAnnotations.find(a => a.id === id);
  saUnlinkTagForAnnotation(toDelete);
  saAnnotations = saAnnotations.filter(a => a.id !== id);
  if (saSelectedId === id) saSelectedId = null;
  if (saActiveId === id) saActiveId = saAnnotations.length ? saAnnotations[saAnnotations.length - 1].id : null;
  saRepaint(); saRenderList(); saSyncStore(); saUpdateBanner();
}

function saUndo() {
  if (saDrawing) return;
  const active = saAnnotations.find(a => a.id === saActiveId);
  if (active && active.strokes.length > 0) {
    active.strokes.pop();
    if (active.strokes.length === 0 && saAnnotations.length > 1) {
      // remove empty annotation, go back to previous
      saAnnotations = saAnnotations.filter(a => a.id !== saActiveId);
      const prev = saAnnotations[saAnnotations.length - 1];
      saActiveId   = prev ? prev.id : null;
      saSelectedId = saActiveId;
    }
  } else if (saAnnotations.length > 0) {
    // No active or active is empty: remove the last annotation entirely
    const last = saAnnotations[saAnnotations.length - 1];
    saAnnotations.pop();
    if (saSelectedId === last.id) saSelectedId = null;
    if (saActiveId   === last.id) {
      const prev = saAnnotations[saAnnotations.length - 1];
      saActiveId   = prev ? prev.id : null;
      saSelectedId = saActiveId;
    }
  }
  saRepaint(); saRenderList(); saSyncStore(); saUpdateBanner();
}

// ── Hit-test: find annotation closest to click ──
function saHitTest(nx, ny, canvas) {
  const HIT = 20 / Math.max(canvas.width, canvas.height);
  let best = null, bestDist = HIT;
  saAnnotations.forEach(a => {
    (a.strokes || []).forEach(stroke => {
      // Placement area strokes: hit-test against a central nucleus (45% of the ellipse radius)
      if (stroke.soft && stroke.placement_area) {
        const pa = stroke.placement_area;
        const dx = (nx - pa.cx) / (pa.w / 2 * 0.45 + 0.01);
        const dy = (ny - pa.cy) / (pa.h / 2 * 0.45 + 0.01);
        if (dx * dx + dy * dy <= 1) { best = a; bestDist = 0; }
        return;
      }
      // Regular strokes: nearest-point hit test
      for (const p of (stroke.pts || [])) {
        const d = Math.hypot(p.x - nx, p.y - ny);
        if (d < bestDist) { bestDist = d; best = a; }
      }
    });
  });
  return best;
}

// ── Resize canvas ──
function annDrawResizeCanvas() {
  const img      = document.getElementById('ann-img');
  const canvas   = document.getElementById('ann-draw-canvas');
  const wrap     = document.getElementById('ann-img-wrap');
  const viewport = document.getElementById('ann-img-viewport');
  if (!canvas || !img || !wrap) return;
  if (!img.naturalWidth) return; // image not loaded yet

  // Canvas buffer = natural resolution for pixel-perfect overlay on all images
  canvas.width  = img.naturalWidth;
  canvas.height = img.naturalHeight;

  // Base display size at zoom=1: constrain natural size to 380px max height.
  // Compute from aspect ratio to guarantee no distortion at any zoom level.
  const panelW    = viewport ? (viewport.parentElement?.offsetWidth || 600) : 600;
  const maxH      = 380;
  const scaleBase = Math.min(1, panelW / img.naturalWidth, maxH / img.naturalHeight);
  // Derive baseH from baseW using the exact natural aspect ratio (avoids rounding distortion)
  const baseW = Math.round(img.naturalWidth  * scaleBase);
  const baseH = Math.round(baseW * img.naturalHeight / img.naturalWidth);

  // Display = base * zoom — height derived from width to preserve aspect ratio exactly
  const dispW = Math.round(baseW * saZoom);
  const dispH = Math.round(dispW * img.naturalHeight / img.naturalWidth);
  img.style.width   = dispW + 'px';
  img.style.height  = dispH + 'px';
  wrap.style.width  = dispW + 'px';
  wrap.style.height = dispH + 'px';
  canvas.style.width  = dispW + 'px';
  canvas.style.height = dispH + 'px';

  // Viewport is fixed at zoom=1 size; hide scrollbars when not zoomed in
  if (viewport) {
    viewport.style.width    = baseW + 'px';
    viewport.style.height   = baseH + 'px';
    viewport.style.overflow = (saZoom > 1) ? 'auto' : 'hidden';
  }

  saRepaint();
}

// ── Merge legacy single-stroke unlabeled annotations into one group ──
function saMergeUnlabeled(anns) {
  // Collect contiguous runs of unlabeled annotations that each have exactly 1 stroke
  // (these are pre-refactor artifacts). Merge each run into one annotation.
  const out = [];
  let run = null;
  for (const a of anns) {
    const isLegacy = !a.label && a.strokes.length === 1;
    if (isLegacy) {
      if (!run) {
        run = { id: a.id, strokes: [...a.strokes], label: null, label_type: null };
      } else {
        run.strokes.push(...a.strokes);
      }
    } else {
      if (run) { out.push(run); run = null; }
      out.push(a);
    }
  }
  if (run) out.push(run);
  return out;
}

// ── Load/Save ──
function annDrawLoadForItem(sha) {
  saStopAnimation();
  saAnnotations = [];
  saSelectedId  = null;
  saActiveId    = null;
  saResetZoom();
  const store = annStore();
  const rec   = store[sha] || annItems.find(i => i.sha === sha) || {};
  if (Array.isArray(rec.spatial_annotations)) {
    saAnnotations = rec.spatial_annotations.map(saMigrate);
    // Merge consecutive unlabeled single-stroke annotations (legacy data from before multi-stroke refactor)
    saAnnotations = saMergeUnlabeled(saAnnotations);
  }
  // Resume into last annotation only if it is still unlabeled
  const last = saAnnotations[saAnnotations.length - 1];
  if (last && !last.label) {
    saActiveId   = last.id;
    saSelectedId = last.id;
  }
  saRepaint();
  saRenderList();
  saUpdateBanner();
}

function saSyncStore() {
  const item = annItems[annIdx];
  if (!item) return;
  const store = annStore();
  const rec   = store[item.sha] || {};
  rec.spatial_annotations = saAnnotations;
  store[item.sha] = rec;
  annStoreSet(store);
  annSetResume(annIdx);
}

// ── Setup pointer listeners ──
function annDrawSetupListeners() {
  const wrap = document.getElementById('ann-img-wrap');
  if (!wrap) return;

  function getPos(e) {
    const r   = wrap.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) / r.width, y: (src.clientY - r.top) / r.height };
  }

  function onStart(e) {
    if (READONLY) return;
    const p = getPos(e);
    if (!saDrawActive) {
      // Click-to-select mode
      const canvas = document.getElementById('ann-draw-canvas');
      const hit    = canvas ? saHitTest(p.x, p.y, canvas) : null;
      saSelect(hit ? hit.id : null);
      return;
    }
    e.preventDefault();
    saDrawing  = true;
    annTagHoverOff(); // hide any tooltip visible before drawing started
    saDrawLast = p;
    saDrawCurrent = { id: saNextId(), pts: [p], size: parseInt(document.getElementById('ann-brush-size')?.value || 8), soft: saSoftBrush, label: null, label_type: null };
  }
  function onMove(e) {
    if (!saDrawing || !saDrawCurrent) return;
    e.preventDefault();
    const p = getPos(e);
    saDrawCurrent.pts.push(p);
    saDrawLast = p;
    saRepaint();
  }
  function onEnd() {
    if (!saDrawing || !saDrawCurrent) return;
    saDrawing = false;
    let stroke;
    if (saDrawCurrent.soft && saDrawCurrent.pts.length > 0) {
      // Placement stroke: save only bounding box as area metadata, not raw pts
      const xs = saDrawCurrent.pts.map(p => p.x);
      const ys = saDrawCurrent.pts.map(p => p.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      stroke = {
        pts: [],
        size: saDrawCurrent.size,
        soft: true,
        placement_area: {
          x: minX, y: minY,
          w: Math.max(0.01, maxX - minX),
          h: Math.max(0.01, maxY - minY),
          cx: (minX + maxX) / 2,
          cy: (minY + maxY) / 2
        }
      };
    } else {
      stroke = { pts: saDrawCurrent.pts, size: saDrawCurrent.size, soft: false };
    }
    saDrawCurrent = null;

    // Find or create the active annotation
    let active = saAnnotations.find(a => a.id === saActiveId);
    if (!active) {
      active = { id: saNextId(), strokes: [], label: null, label_type: null };
      saAnnotations.push(active);
      saActiveId   = active.id;
      saSelectedId = active.id;
    }
    active.strokes.push(stroke);

    saRepaint();
    saRenderList();
    saSyncStore();
    saUpdateBanner();
  }

  wrap.addEventListener('mousedown',  onStart, { passive: false });
  wrap.addEventListener('mousemove',  onMove,  { passive: false });
  wrap.addEventListener('mouseup',    onEnd);
  wrap.addEventListener('mouseleave', onEnd);
  wrap.addEventListener('touchstart', onStart, { passive: false });
  wrap.addEventListener('touchmove',  onMove,  { passive: false });
  wrap.addEventListener('touchend',   onEnd);

  wrap.addEventListener('mousemove', e => {
    if (saDrawing) return;
    const canvas = document.getElementById('ann-draw-canvas');
    if (!canvas) return;
    const p = getPos(e);
    const hit = saHitTest(p.x, p.y, canvas);
    const newId = hit ? hit.id : null;
    if (newId !== saHoverId) {
      saHoverId = newId;
      saRepaint();
      if (newId) {
        const a = saAnnotations.find(x => x.id === newId);
        if (a?.label) {
          saShowCanvasTooltip(a.label, a.label_type, e.clientX, e.clientY);
        } else {
          annTagHoverOff();
        }
      } else {
        annTagHoverOff();
      }
    } else if (newId) {
      // Update tooltip position while hovering same annotation
      const tt = document.getElementById('ann-tag-tooltip');
      if (tt && tt.style.display !== 'none') {
        let left = e.clientX + 16;
        let top = e.clientY - 20;
        if (left + 330 > window.innerWidth) left = e.clientX - 330 - 8;
        if (top + 200 > window.innerHeight) top = window.innerHeight - 200;
        tt.style.left = Math.max(4, left) + 'px';
        tt.style.top = Math.max(4, top) + 'px';
      }
    }
  }, { passive: true });
  wrap.addEventListener('mouseleave', () => {
    if (saHoverId !== null) { saHoverId = null; saRepaint(); }
    annTagHoverOff();
  }, { passive: true });

  const viewport = document.getElementById('ann-img-viewport');
  if (viewport) {
    viewport.addEventListener('wheel', e => {
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        const rect   = viewport.getBoundingClientRect();
        const focalX = e.clientX - rect.left;
        const focalY = e.clientY - rect.top;
        // Continuous zoom toward mouse: exp(-deltaY * k) keeps ratio smooth
        const newZ = saZoom * Math.exp(-e.deltaY * 0.005);
        saSetZoom(newZ, focalX, focalY);
      }
    }, { passive: false });
  }
}

// Resize canvas when image loads or window resizes
document.addEventListener('DOMContentLoaded', () => {
  const img = document.getElementById('ann-img');
  if (img) img.addEventListener('load', annDrawResizeCanvas);
  new ResizeObserver(annDrawResizeCanvas).observe(document.body);
});

/* ═══════════════════════════════════════════════════════════
   RESUME · JUMP · CATEGORY SEARCH
   ═══════════════════════════════════════════════════════════ */

// ── Resume: remember last modified item ──
const ANN_RESUME_KEY = 'ann_resume';

function annSetResume(idx) {
  const item = annItems[idx];
  if (!item) return;
  localStorage.setItem(ANN_RESUME_KEY, JSON.stringify({
    idx,
    sha: item.sha,
    prefill: item.prefill_labels || [],
    updated_at: new Date().toISOString(),
  }));
  annUpdateResumeBtn();
}

function annGoToLast() {
  try {
    const r = JSON.parse(localStorage.getItem(ANN_RESUME_KEY) || 'null');
    if (r && typeof r.idx === 'number') annLoad(r.idx);
  } catch {}
}

function annUpdateResumeBtn() {
  const btn = document.getElementById('ann-resume-btn');
  if (!btn) return;
  try {
    const r = JSON.parse(localStorage.getItem(ANN_RESUME_KEY) || 'null');
    if (r && typeof r.idx === 'number') {
      const num  = r.idx + 1;
      const lbl  = r.prefill?.filter(c => c.length > 3).join(' · ') || r.prefill?.join(' · ') || '—';
      const date = r.updated_at ? new Date(r.updated_at).toLocaleDateString('en-GB', { day:'numeric', month:'short' }) : '';
      btn.textContent = `↩ Resume at #${num}  ${lbl}${date ? '  ·  ' + date : ''}`;
      btn.style.display = '';
    } else {
      btn.style.display = 'none';
    }
  } catch { btn.style.display = 'none'; }
}

// ── Jump to number ──
function annJumpTo(val) {
  const n = parseInt(val, 10);
  if (!isNaN(n) && n >= 1 && n <= annItems.length) {
    annLoad(n - 1);
    const inp = document.getElementById('ann-jump-input');
    if (inp) inp.value = '';
  }
}

// ── Category search ──
let annCatIndex   = null;   // { code: [idx, ...], ... }
let annCatFocus   = -1;
let annCatResults = [];

function annBuildCatIndex() {
  if (annCatIndex) return;
  annCatIndex = {};
  annItems.forEach((item, i) => {
    (item.prefill_labels || []).forEach(code => {
      (annCatIndex[code] = annCatIndex[code] || []).push(i);
    });
  });
}

// Map code → human name (from ANN_TAXONOMY + MAURER_TC)
function annCatName(code) {
  const g = code.substring(0, 3);
  if (ANN_TAXONOMY[g]?.[code]) return ANN_TAXONOMY[g][code];
  const m = MAURER_TC.find(x => x.code === code);
  if (m) return m.name;
  // Group-level code like "K-H"
  const groups = { 'K-A':'Basic Scribbles','K-B':'Placement Patterns','K-C':'Emergent Diagrams',
    'K-D':'Diagrams','K-E':'Combines','K-F':'Aggregates','K-G':'Mandalas','K-H':'Suns','K-I':'Radials' };
  return groups[code] || code;
}

function annCatSearch(q) {
  annBuildCatIndex();
  const ql = q.toLowerCase().trim();
  const codes = Object.keys(annCatIndex);
  const matches = codes
    .map(code => ({ code, name: annCatName(code), count: annCatIndex[code].length }))
    .filter(c => !ql || c.code.toLowerCase().includes(ql) || c.name.toLowerCase().includes(ql))
    .sort((a, b) => b.count - a.count)
    .slice(0, 35);
  annCatResults = matches;
  annCatFocus   = -1;
  annCatShowDrop();
}

function annCatShowDrop() {
  annCatHide();
  const inp = document.getElementById('ann-cat-input');
  if (!inp || !annCatResults.length) return;
  const dd = document.createElement('div');
  dd.id = 'ann-cat-dropdown';
  dd.className = 'ann-cat-dropdown';
  annCatResults.forEach((c, i) => {
    const opt = document.createElement('div');
    opt.className = 'ann-cat-option' + (i === annCatFocus ? ' ann-cat-focused' : '');
    opt.innerHTML = `<span class="aco-code">${c.code}</span><span class="aco-name">${c.name}</span><span class="aco-count">${c.count}</span>`;
    opt.addEventListener('mousedown', ev => { ev.preventDefault(); annCatJump(c.code); });
    dd.appendChild(opt);
  });
  const r = inp.getBoundingClientRect();
  dd.style.top   = (r.bottom + 2) + 'px';
  dd.style.left  = r.left + 'px';
  dd.style.width = r.width + 'px';
  document.body.appendChild(dd);
}

function annCatHide() {
  const d = document.getElementById('ann-cat-dropdown');
  if (d) d.remove();
}

function annCatKeyDown(e) {
  const opts = document.querySelectorAll('#ann-cat-dropdown .ann-cat-option');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    annCatFocus = Math.min(annCatFocus + 1, annCatResults.length - 1);
    opts.forEach((o, i) => o.classList.toggle('ann-cat-focused', i === annCatFocus));
    opts[annCatFocus]?.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    annCatFocus = Math.max(annCatFocus - 1, -1);
    opts.forEach((o, i) => o.classList.toggle('ann-cat-focused', i === annCatFocus));
    if (annCatFocus >= 0) opts[annCatFocus]?.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (annCatFocus >= 0 && annCatResults[annCatFocus]) annCatJump(annCatResults[annCatFocus].code);
    else if (annCatResults[0]) annCatJump(annCatResults[0].code);
  } else if (e.key === 'Escape') {
    annCatHide();
    document.getElementById('ann-cat-input').blur();
  }
}

function annCatJump(code) {
  annBuildCatIndex();
  const indices = annCatIndex[code];
  if (!indices || !indices.length) return;
  annLoad(indices[0]);
  annCatHide();
  const inp = document.getElementById('ann-cat-input');
  if (inp) inp.value = '';
}

/* ═══════════════════════════════════════════════════════════
   EVENTS
   ═══════════════════════════════════════════════════════════ */
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeDetail();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();

  // Shortcuts active only when annotator is visible and focus is NOT in a text input
  const inInput = ['INPUT','TEXTAREA'].includes(document.activeElement?.tagName);
  const annSection = document.getElementById('annotator-section');
  const annVisible = annSection &&
    annSection.getBoundingClientRect().bottom > 0 &&
    annSection.getBoundingClientRect().top < window.innerHeight;

  if (annVisible) {
    // Ctrl+Z — undo last stroke
    if (e.key === 'z' && (e.ctrlKey || e.metaKey) && !e.shiftKey) {
      saUndo();
      e.preventDefault();
    }
    // Arrow keys — navigate images (only when not typing)
    if (!inInput && !e.ctrlKey && !e.metaKey) {
      if (e.key === 'ArrowRight') { annNav(1);  e.preventDefault(); }
      if (e.key === 'ArrowLeft')  { annNav(-1); e.preventDefault(); }
    }
    // Alt+Enter — new annotation group (Ctrl+N opens browser tab, avoid that)
    if (e.key === 'Enter' && e.altKey) {
      saNewAnnotation();
      e.preventDefault();
    }
    // Zoom with Ctrl+= / Ctrl+-
    if (e.key === '=' && (e.ctrlKey || e.metaKey)) { saZoomStep(1); e.preventDefault(); }
    if (e.key === '-' && (e.ctrlKey || e.metaKey)) { saZoomStep(-1); e.preventDefault(); }
    if (e.key === '0' && (e.ctrlKey || e.metaKey)) { saResetZoom(); e.preventDefault(); }
  }
});
window.addEventListener('DOMContentLoaded', init);

function annDataOpen() {
  const modal = document.getElementById('ann-data-modal');
  const pre   = document.getElementById('ann-data-modal-pre');
  if (!modal || !pre) return;
  modal.classList.add('open');
  // Load data: try localStorage first, then fetch from server
  const local = annStore(); // from localStorage
  if (Object.keys(local).length > 0) {
    pre.textContent = JSON.stringify(local, null, 2);
  } else {
    // Public page: fetch from data file
    fetch('data/annotations_local.json')
      .then(r => r.json())
      .then(d => { pre.textContent = JSON.stringify(d, null, 2); })
      .catch(() => { pre.textContent = '(No data available)'; });
  }
}
function annDataClose() {
  document.getElementById('ann-data-modal')?.classList.remove('open');
}
function annDataCopy() {
  const pre = document.getElementById('ann-data-modal-pre');
  if (pre) navigator.clipboard.writeText(pre.textContent).catch(() => {});
}
// Close on backdrop click
document.getElementById('ann-data-modal')?.addEventListener('click', e => {
  if (e.target === document.getElementById('ann-data-modal')) annDataClose();
});
</script>
<div id="ann-data-modal">
  <div id="ann-data-modal-box">
    <div id="ann-data-modal-toolbar">
      <h3>All annotation data</h3>
      <span class="spacer"></span>
      <button onclick="annDataCopy()" style="padding:0.2rem 0.6rem;cursor:pointer;">Copy JSON</button>
      <button onclick="annDataClose()" style="padding:0.2rem 0.6rem;cursor:pointer;">✕ Close</button>
    </div>
    <pre id="ann-data-modal-pre"></pre>
  </div>
</div>
