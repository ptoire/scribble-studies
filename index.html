// ── Thumb zoom globals ────────────────────────────────────────────────────────
let _thumbTimer = null;
let _thumbZoomEl = null;
function isThumbIn(e, src) {
  clearTimeout(_thumbTimer);
  _thumbTimer = setTimeout(() => {
    if (!_thumbZoomEl) {
      _thumbZoomEl = document.createElement('img');
      _thumbZoomEl.className = 'is-thumb-zoom';
      document.body.appendChild(_thumbZoomEl);
    }
    _thumbZoomEl.src = src;
    _thumbZoomEl.style.left = Math.min(e.clientX + 14, window.innerWidth - 240) + 'px';
    _thumbZoomEl.style.top  = Math.max(e.clientY - 110, 10) + 'px';
    _thumbZoomEl.style.display = 'block';
  }, 500);
}
function isThumbMove(e) {
  if (_thumbZoomEl && _thumbZoomEl.style.display !== 'none') {
    _thumbZoomEl.style.left = Math.min(e.clientX + 14, window.innerWidth - 240) + 'px';
    _thumbZoomEl.style.top  = Math.max(e.clientY - 110, 10) + 'px';
  }
}
function isThumbOut() {
  clearTimeout(_thumbTimer);
  if (_thumbZoomEl) _thumbZoomEl.style.display = 'none';
}

function isRenderChips() {
  const area = document.getElementById('is-chip-grid');
  if (!area) return;
  const groups = {};
  IMAGE_SCHEMATA.forEach(s => { (groups[s.group] = groups[s.group] || []).push(s); });
  ['Spatial Primitive','Path Family','Containment Family','Contact Family','Force Schemas','Orientational','Composition','Rhythm','Existence','Ground','Temporal'].forEach(g => {
    if (!groups[g]) return;
    const sep = document.createElement('div');
    sep.className = 'is-chip-group-sep';
    sep.textContent = g;
    area.appendChild(sep);
    groups[g].forEach(schema => {
      const chip = document.createElement('div');
      chip.className = 'is-chip';
      chip.dataset.code  = schema.code;
      chip.dataset.group = schema.group;
      chip.innerHTML = `<span class="is-chip-code">${schema.code}</span><span class="is-chip-name">${schema.name}</span>`;
      chip.addEventListener('click', () => isSelectSchema(schema.code));
      area.appendChild(chip);
    });
  });
}

function isRenderGuide() {
  const ph    = document.getElementById('is-guide-placeholder');
  const name  = document.getElementById('is-guide-name');
  const prompt= document.getElementById('is-guide-prompt');
  const chips = document.getElementById('is-guide-chips');
  if (!ph || !name || !prompt || !chips) return;
  if (!isSelectedSchema) {
    ph.style.display     = '';
    name.style.display   = 'none';
    prompt.style.display = 'none';
    chips.innerHTML      = '';
    return;
  }
  ph.style.display     = 'none';
  name.style.display   = '';
  prompt.style.display = '';
  name.textContent     = isSelectedSchema.name;
  chips.innerHTML      = '';
  const kMap = {};
  if (INDEX_DATA && INDEX_DATA.sessions)
    INDEX_DATA.sessions.forEach(s => { kMap[s.code] = s.session_id; });
  const makeGuideChip = (code, cls) => {
    const sid = kMap[code];
    const src = sid ? `${BASE_URL}img/${sid}_thumb.png` : '';
    const c = document.createElement('span');
    c.className = `is-guide-k-chip ${cls}`;
    c.title = isKName(code);
    if (src) {
      const img = document.createElement('img');
      img.src = src; img.alt = code; img.loading = 'lazy';
      img.className = 'is-k-thumb';
      img.addEventListener('mouseenter', e => isThumbIn(e, src));
      img.addEventListener('mousemove',  isThumbMove);
      img.addEventListener('mouseleave', isThumbOut);
      c.appendChild(img);
    }
    c.appendChild(document.createTextNode(code));
    return c;
  };
  const km = isSelectedSchema.kellogg_mapping || {};
  (km.codes_primary || []).forEach(code =>
    chips.appendChild(makeGuideChip(code, 'primary')));
  (km.codes_secondary || []).forEach(code =>
    chips.appendChild(makeGuideChip(code, 'secondary')));
}

function isRenderSwatches() {
  const wrap = document.getElementById('is-swatches');
  if (!wrap) return;
  BRUSH_PALETTE.forEach((c, i) => {
    const sw = document.createElement('div');
    sw.className   = 'is-swatch' + (i === 0 ? ' active' : '');
    sw.style.background = c;
    sw.addEventListener('click', () => {
      isDrawColor = c;
      wrap.querySelectorAll('.is-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
    });
    wrap.appendChild(sw);
  });
}

function isSelectSchema(code) {
  isSelectedSchema = IMAGE_SCHEMATA.find(s => s.code === code) || null;
  const activated = new Set(isActivated(code));
  document.querySelectorAll('#is-chip-grid .is-chip').forEach(ch => {
    const c = ch.dataset.code;
    ch.classList.toggle('active',    c === code);
    ch.classList.toggle('ancestor',  c !== code && activated.has(c));
  });
  isRenderGuide();
  isRenderPrompt();
  isRenderInfo();
  isUpdateSaveBtn();
  const ph = document.getElementById('is-placeholder');
  if (ph) ph.style.display = (isStrokes.length === 0) ? 'flex' : 'none';
}

function isRenderPrompt() {
  const box   = document.getElementById('is-canvas-prompt');
  const scene = document.getElementById('is-prompt-scene');
  const instr = document.getElementById('is-prompt-instructions');
  if (!box) return;
  if (!isSelectedSchema) { box.classList.remove('visible'); return; }
  scene.textContent = isSelectedSchema.drawing_scene || '';
  instr.textContent = isSelectedSchema.drawing_instructions || '';
  box.classList.add('visible');
}

function isRenderInfo() {
  const panel = document.getElementById('is-info-panel');
  if (!panel) return;
  if (!isSelectedSchema) {
    panel.innerHTML = '<div class="is-info-placeholder">Select a schema above to begin</div>';
    return;
  }
  const s = isSelectedSchema;
  const gc = s.group.replace(/[^a-zA-Z0-9]/g, '');
  const km = s.kellogg_mapping || {};
  const strength = km.strength || '';

  function renderSrc(arr) {
    return (arr || []).map(r => r.replace(/\*([^*]+)\*/g, '<em>$1</em>')).join('<br>');
  }
  function renderCodeLink(code, cls) {
    const sid = (INDEX_DATA && INDEX_DATA.sessions
      ? INDEX_DATA.sessions.find(ss => ss.code === code) : null)?.session_id;
    const src = sid ? `${BASE_URL}img/${sid}_thumb.png` : '';
    const imgTag = src
      ? `<img class="is-k-thumb" src="${src}" alt="${code}" loading="lazy"
           onmouseenter="isThumbIn(event,'${src}')" onmousemove="isThumbMove(event)" onmouseleave="isThumbOut()">`
      : '';
    return `<span class="is-k-chip ${cls}" title="${isKName(code)}">${imgTag}${code}</span>`;
  }

  const dislChips = (s.disl_primitives || [])
    .map(p => `<span class="is-disl-chip">${p}</span>`).join('');

  const parentLinks = (s.parents || [])
    .map(c => `<span class="is-rel-chip" onclick="isSelectSchema('${c}')">${c}</span>`).join('');
  const relatedLinks = (s.related || [])
    .map(c => `<span class="is-rel-chip" onclick="isSelectSchema('${c}')">${c}</span>`).join('');

  const kmNote = km.note
    ? `<div class="is-kellogg-note">${km.note}</div>` : '';
  const noCorr = strength === 'none'
    ? `<div class="is-kellogg-note" style="color:var(--c-km-none);font-style:italic;">
         No direct Kellogg correspondence — must be constructed compositionally.</div>` : '';

  const primaryChips  = (km.codes_primary  || []).map(c => renderCodeLink(c, 'primary')).join('');
  const secondaryChips= (km.codes_secondary|| []).map(c => renderCodeLink(c, 'secondary')).join('');
  const kmChipsBlock  = (primaryChips || secondaryChips) ? `
    <div class="is-kellogg-label">Primary</div>
    <div class="is-kellogg-chips">${primaryChips || '<span style="color:var(--c-text-tertiary);font-size:0.6rem">—</span>'}</div>
    <div class="is-kellogg-label">Secondary</div>
    <div class="is-kellogg-chips">${secondaryChips || '<span style="color:var(--c-text-tertiary);font-size:0.6rem">—</span>'}</div>` : noCorr;

  panel.innerHTML = `
    <div class="is-info-col">
      <div class="is-info-name">${s.name}</div>
      <div class="is-info-meta">
        <span class="is-group-badge ${gc}">${s.group}</span>
        <span class="is-disl-class">${s.disl_classification || ''}</span>
      </div>
      <div class="is-definition">${s.definition}</div>
      ${parentLinks ? `<div class="is-section-label">Parents</div><div class="is-rel-chips">${parentLinks}</div>` : ''}
      ${relatedLinks ? `<div class="is-section-label">Related</div><div class="is-rel-chips">${relatedLinks}</div>` : ''}
    </div>
    <div class="is-info-col">
      <div class="is-section-label">
        Kellogg mapping
        <span class="is-km-badge ${strength}" style="margin-left:0.4rem;">${strength}</span>
      </div>
      <div class="is-kellogg-box">
        ${kmChipsBlock}
        ${kmNote}
      </div>
      <div class="is-section-label">DISL primitives</div>
      <div class="is-disl-chips">${dislChips}</div>
      <div class="is-section-label">Sources</div>
      <div class="is-sources">${renderSrc(s.sources)}</div>
    </div>
  `;
}

// ── Canvas drawing ──────────────────────────────────────────────────────────
function isSetupCanvas() {
  const canvas = document.getElementById('is-canvas');
  if (!canvas) return;
  let drawing = false;

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - r.left) / r.width,
      y: (e.clientY - r.top)  / r.height,
      t: Date.now(),
      pressure: (e.pressure > 0) ? e.pressure : 0.5,
    };
  }
  function onStart(e) {
    e.preventDefault();
    drawing = true;
    canvas.setPointerCapture(e.pointerId);
    const p = getPos(e);
    isCurrentStroke = { pts: [p], color: isDrawColor, size: isBrushSize };
    const ph = document.getElementById('is-placeholder');
    if (ph) ph.style.display = 'none';
  }
  function onMove(e) {
    if (!drawing || !isCurrentStroke) return;
    e.preventDefault();
    isCurrentStroke.pts.push(getPos(e));
    isRedrawCanvas();
  }
  function onEnd() {
    if (!drawing || !isCurrentStroke) return;
    drawing = false;
    if (isCurrentStroke.pts.length > 0) isStrokes.push(isCurrentStroke);
    isCurrentStroke = null;
    isRedrawCanvas();
    isUpdateSaveBtn();
  }
  canvas.addEventListener('pointerdown', onStart, { passive: false });
  canvas.addEventListener('pointermove', onMove,  { passive: false });
  canvas.addEventListener('pointerup',     onEnd);
  canvas.addEventListener('pointercancel', onEnd);
  document.addEventListener('keydown', function isKbUndo(e) {
    if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'z') {
      e.preventDefault();
      isUndo();
    }
  });
}

function isRedrawCanvas() {
  const canvas = document.getElementById('is-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 1200, 800);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  isStrokes.forEach(s => isDrawStroke(ctx, s));
  if (isCurrentStroke) isDrawStroke(ctx, isCurrentStroke);
}

function isDrawStroke(ctx, stroke) {
  const pts = stroke.pts;
  if (!pts || !pts.length) return;
  const W = 1200, H = 800;
  const n = pts.length;
  ctx.strokeStyle = stroke.color;
  ctx.fillStyle   = stroke.color;
  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';
  const isBlack = stroke.color === BRUSH_PALETTE[0] || stroke.color === '#0D0D0D' || stroke.color === '#1A1A1E';
  ctx.shadowColor = isBlack ? 'transparent' : stroke.color;
  ctx.shadowBlur  = isBlack ? 0 : 5;

  if (n === 1) {
    const lw = Math.max(0.5, stroke.size * 0.6);
    ctx.beginPath();
    ctx.arc(pts[0].x * W, pts[0].y * H, lw / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
    return;
  }

  // Per-point line width: speed-sensitive (fast = thin) + pressure-sensitive
  const widths = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    let speedFactor = 1;
    if (i > 0) {
      const dx = (pts[i].x - pts[i-1].x) * W;
      const dy = (pts[i].y - pts[i-1].y) * H;
      const dt = Math.max(1, pts[i].t - pts[i-1].t);
      const vel = Math.sqrt(dx*dx + dy*dy) / dt; // px/ms
      speedFactor = Math.max(0.15, 1 - vel * 7);
    }
    const pressure = (pts[i].pressure > 0) ? pts[i].pressure : 0.5;
    widths[i] = Math.max(0.4, Math.min(stroke.size * 3.2, stroke.size * speedFactor * pressure * 2.8));
  }

  // Taper: fade in/out over first and last few points
  const T = Math.min(6, Math.floor(n / 3));
  for (let i = 0; i < T; i++) {
    const f = (i + 1) / (T + 1);
    widths[i]         *= f;
    widths[n - 1 - i] *= f;
  }

  // Draw bezier segments via midpoints, one segment per point pair (varying lineWidth)
  for (let i = 0; i < n - 1; i++) {
    const x0 = i === 0 ? pts[0].x * W : (pts[i-1].x + pts[i].x) / 2 * W;
    const y0 = i === 0 ? pts[0].y * H : (pts[i-1].y + pts[i].y) / 2 * H;
    const cpx = pts[i].x * W;
    const cpy = pts[i].y * H;
    const x1  = (pts[i].x + pts[i+1].x) / 2 * W;
    const y1  = (pts[i].y + pts[i+1].y) / 2 * H;
    ctx.lineWidth = (widths[i] + widths[i+1]) / 2;
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.quadraticCurveTo(cpx, cpy, x1, y1);
    ctx.stroke();
  }
  // Last segment: midpoint of last two → final point
  const x0 = (pts[n-2].x + pts[n-1].x) / 2 * W;
  const y0 = (pts[n-2].y + pts[n-1].y) / 2 * H;
  ctx.lineWidth = widths[n-1];
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(pts[n-1].x * W, pts[n-1].y * H);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';
}

function isUndo() {
  if (!isStrokes.length) return;
  isStrokes.pop();
  isRedrawCanvas();
  isUpdateSaveBtn();
  if (!isStrokes.length) {
    const ph = document.getElementById('is-placeholder');
    if (ph) ph.style.display = 'flex';
  }
}

function isClear() {
  isStrokes = []; isCurrentStroke = null;
  isRedrawCanvas();
  isUpdateSaveBtn();
  const ph = document.getElementById('is-placeholder');
  if (ph) ph.style.display = 'flex';
}

function isUpdateSaveBtn() {
  const btn = document.getElementById('is-save-btn');
  if (btn) btn.disabled = !(isSelectedSchema && isStrokes.length > 0);
}

// ── Save session ──────────────────────────────────────────────────────────────
function isSaveSession() {
  if (!isSelectedSchema || !isStrokes.length) return;
  const canvas = document.getElementById('is-canvas');
  if (!canvas) return;
  const schema    = isSelectedSchema;
  const sessionId = `IS_${schema.code}_${Date.now()}`;

  // Full-res PNG
  const fullDataUrl = canvas.toDataURL('image/png');

  // Thumbnail 300×200
  const tc = document.createElement('canvas');
  tc.width = 300; tc.height = 200;
  const tctx = tc.getContext('2d');
  tctx.fillStyle = '#fff'; tctx.fillRect(0, 0, 300, 200);
  tctx.drawImage(canvas, 0, 0, 300, 200);
  const thumbDataUrl = tc.toDataURL('image/png');

  // Anim JSON: denormalize x,y; compute velocity (px/s) for each point
  const animStrokes = isStrokes.map(s => s.pts.map((p, i) => {
    let vel = 0;
    if (i > 0) {
      const pp = s.pts[i-1];
      const dx = (p.x - pp.x) * 1200;
      const dy = (p.y - pp.y) * 800;
      const dt = Math.max(1, p.t - pp.t) / 1000; // seconds
      vel = Math.round(Math.sqrt(dx*dx + dy*dy) / dt);
    }
    return { x: Math.round(p.x * 1200), y: Math.round(p.y * 800), t: p.t, pressure: p.pressure, velocity: vel };
  }));
  const totalPoints = animStrokes.reduce((n, s) => n + s.length, 0);

  const session = {
    session_id:    sessionId,
    schema_code:   schema.code,
    schema_name:   schema.name,
    schema_group:  schema.group,
    timestamp:     new Date().toISOString(),
    thumb_dataurl: thumbDataUrl,
    full_dataurl:  fullDataUrl,
    anim:          { w: 1200, h: 800, strokes: animStrokes },
    total_strokes: isStrokes.length,
    total_points:  totalPoints,
  };

  const sessions = isGetSessions();
  sessions.push(session);
  isSaveSessions(sessions);
  isClear();

  const fb = document.getElementById('is-save-fb');
  if (fb) { fb.textContent = 'Saved ✓'; setTimeout(() => { if (fb) fb.textContent = ''; }, 2500); }
  isRenderArchive();
  isUpdateChipCounts();

  // Auto-save skeleton (no PNGs) to server — degrades gracefully on public page
  try {
    const skeletonSessions = sessions.map(s => {
      const { thumb_dataurl, full_dataurl, ...rest } = s;
      return rest;
    });
    fetch('/api/is_sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessions: skeletonSessions }),
    }).catch(() => {});
  } catch {}
}

// ── Archive ───────────────────────────────────────────────────────────────────
function isRenderArchive() {
  const grid = document.getElementById('is-archive-grid');
  if (!grid) return;
  const sessions = isGetSessions();
  if (!sessions.length) {
    grid.innerHTML = '<div class="is-archive-empty">No sessions saved yet. Draw and save a session to see it here.</div>';
    return;
  }
  grid.innerHTML = '';
  [...sessions].reverse().forEach(sess => {
    const card = document.createElement('div');
    card.className = 'is-archive-card';
    const date = new Date(sess.timestamp).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    card.innerHTML = `
      <div class="is-archive-card-img-wrap">
        <img src="${sess.thumb_dataurl}" alt="${sess.schema_name}">
        <canvas class="is-archive-card-anim" width="300" height="200"></canvas>
      </div>
      <div class="is-archive-card-info">
        <div class="is-archive-card-schema">${sess.schema_code}</div>
        <div class="is-archive-card-name">${sess.schema_name}</div>
        <div class="is-archive-card-meta">${sess.total_strokes} stroke${sess.total_strokes !== 1 ? 's' : ''} · ${date}</div>
      </div>
      <div class="is-archive-card-del" title="Delete session">✕</div>
    `;
    card.addEventListener('mouseenter', () => isCardHoverStart(card, sess));
    card.addEventListener('mouseleave', () => isCardHoverEnd(card));
    card.querySelector('.is-archive-card-img-wrap').addEventListener('click', () => isOpenDetail(sess));
    card.querySelector('.is-archive-card-info').addEventListener('click', () => isOpenDetail(sess));
    card.querySelector('.is-archive-card-del').addEventListener('click', e => {
      e.stopPropagation();
      if (confirm('Delete this session?')) {
        isSaveSessions(isGetSessions().filter(s => s.session_id !== sess.session_id));
        isRenderArchive();
        isUpdateChipCounts();
      }
    });
    grid.appendChild(card);
  });
}

// ── Chip saved-count badges ───────────────────────────────────────────────────
function isUpdateChipCounts() {
  const sessions = isGetSessions();
  const counts = {};
  sessions.forEach(s => { counts[s.schema_code] = (counts[s.schema_code] || 0) + 1; });
  document.querySelectorAll('#is-chip-grid .is-chip').forEach(ch => {
    const n = counts[ch.dataset.code] || 0;
    let badge = ch.querySelector('.is-chip-count');
    if (n > 0) {
      if (!badge) { badge = document.createElement('span'); badge.className = 'is-chip-count'; ch.appendChild(badge); }
      badge.textContent = n;
    } else {
      if (badge) badge.remove();
    }
  });
}

// ── Archive card hover animation ─────────────────────────────────────────────
function isCardHoverStart(card, sess) {
  const cvs = card.querySelector('.is-archive-card-anim');
  if (!cvs || !sess.anim) return;
  const ctx = cvs.getContext('2d');
  const W = cvs.width, H = cvs.height; // 300×200
  const anim = sess.anim;
  const scaleX = W / anim.w, scaleY = H / anim.h;
  const allPts = anim.strokes.flat();
  if (!allPts.length) return;
  const tStart = allPts[0].t, tEnd = allPts[allPts.length - 1].t;
  const duration = Math.max(100, tEnd - tStart);
  const animDuration = Math.max(800, duration); // real speed, min 0.8s

  const startTime = performance.now();
  let rafId;
  card._isHoverAnimId = null;

  function frame(now) {
    const progress = Math.min(1, (now - startTime) / animDuration);
    const tCur = tStart + progress * duration;
    ctx.clearRect(0, 0, W, H);
    ctx.lineWidth = 1.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.strokeStyle = '#1A1A1E'; ctx.fillStyle = '#1A1A1E';
    anim.strokes.forEach(stroke => {
      if (!stroke.length) return;
      let started = false;
      ctx.beginPath();
      for (const p of stroke) {
        if (p.t > tCur) break;
        const px = p.x * scaleX, py = p.y * scaleY;
        if (!started) { ctx.moveTo(px, py); started = true; } else ctx.lineTo(px, py);
      }
      if (started) ctx.stroke();
    });
    if (progress < 1) {
      rafId = requestAnimationFrame(frame);
      card._isHoverAnimId = rafId;
    }
  }
  rafId = requestAnimationFrame(frame);
  card._isHoverAnimId = rafId;
}

function isCardHoverEnd(card) {
  if (card._isHoverAnimId) { cancelAnimationFrame(card._isHoverAnimId); card._isHoverAnimId = null; }
  const cvs = card.querySelector('.is-archive-card-anim');
  if (cvs) { const ctx = cvs.getContext('2d'); ctx.clearRect(0, 0, cvs.width, cvs.height); }
}

function isExportAll() {
  const sessions = isGetSessions();
  if (!sessions.length) { alert('No sessions to export.'); return; }
  const blob = new Blob([JSON.stringify(sessions, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'is_studio_sessions.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ── Session detail + playback ─────────────────────────────────────────────────
let _isDetailSess    = null;
let _isDetailAnimId  = null;
let _isDetailPlaying = false;

function isOpenDetail(sess) {
  const overlay = document.getElementById('overlay');
  const panel   = document.getElementById('detail-panel');
  if (!overlay || !panel) return;
  _isDetailSess    = sess;
  _isDetailPlaying = false;
  if (_isDetailAnimId) { cancelAnimationFrame(_isDetailAnimId); _isDetailAnimId = null; }

  const date = new Date(sess.timestamp).toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'});

  const schema = IS_BY_CODE[sess.schema_code] || {};
  const sceneHtml = schema.drawing_scene
    ? `<div class="detail-section-label">Drawing scene</div>
       <div class="detail-drawing-scene">${schema.drawing_scene}</div>` : '';
  const instrHtml = schema.drawing_instructions
    ? `<div class="detail-section-label">How to draw it</div>
       <div class="detail-drawing-instructions">${schema.drawing_instructions}</div>` : '';

  panel.innerHTML = `
    <div class="detail-header">
      <button class="detail-close" onclick="isCloseDetail()">&times;</button>
      <div class="detail-code">${sess.schema_code}</div>
      <div class="detail-name">${sess.schema_name}</div>
      <span class="detail-group-tag">${sess.schema_group || ''}</span>
    </div>
    <div class="detail-body">
      <div class="detail-canvas-section">
        <div class="detail-canvas-container">
          <canvas id="detail-canvas" width="1200" height="800" style="width:100%;height:auto;"></canvas>
        </div>
        <div class="anim-controls">
          <button class="anim-btn" id="btn-play" onclick="isTogglePlay()">▶ Play</button>
          <span class="anim-progress" id="anim-progress"></span>
        </div>
      </div>
      <div class="detail-info-section">
        ${sceneHtml}
        ${instrHtml}
        <div class="detail-section-label" style="margin-top:${sceneHtml ? '1.2rem' : '0'}">Session info</div>
        <div class="info-row"><span class="info-label">Schema</span><span class="info-value">${sess.schema_code}</span></div>
        <div class="info-row"><span class="info-label">Group</span><span class="info-value">${sess.schema_group || '—'}</span></div>
        <div class="info-row"><span class="info-label">Strokes</span><span class="info-value">${sess.total_strokes}</span></div>
        <div class="info-row"><span class="info-label">Points</span><span class="info-value">${sess.total_points}</span></div>
        <div class="info-row"><span class="info-label">Recorded</span><span class="info-value">${date}</span></div>
      </div>
    </div>
  `;

  isDrawStatic(sess.anim);
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function isCloseDetail() {
  if (_isDetailAnimId) { cancelAnimationFrame(_isDetailAnimId); _isDetailAnimId = null; }
  _isDetailPlaying = false;
  _isDetailSess    = null;
  document.getElementById('overlay').classList.remove('active');
  document.body.style.overflow = '';
}

function isDrawStatic(anim) {
  const canvas = document.getElementById('detail-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 1200, 800);
  ctx.strokeStyle = '#1A1A1E'; ctx.fillStyle = '#1A1A1E';
  ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  anim.strokes.forEach(stroke => {
    if (!stroke.length) return;
    if (stroke.length === 1) {
      ctx.beginPath(); ctx.arc(stroke[0].x, stroke[0].y, 1, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.beginPath(); ctx.moveTo(stroke[0].x, stroke[0].y);
      for (let i = 1; i < stroke.length; i++) ctx.lineTo(stroke[i].x, stroke[i].y);
      ctx.stroke();
    }
  });
}

function isTogglePlay() {
  if (_isDetailPlaying) {
    if (_isDetailAnimId) { cancelAnimationFrame(_isDetailAnimId); _isDetailAnimId = null; }
    _isDetailPlaying = false;
    const btn = document.getElementById('btn-play');
    if (btn) { btn.textContent = '▶ Play'; btn.classList.remove('active'); }
    if (_isDetailSess) isDrawStatic(_isDetailSess.anim);
    return;
  }
  if (!_isDetailSess) return;
  const canvas = document.getElementById('detail-canvas');
  if (!canvas) return;
  const anim   = _isDetailSess.anim;
  const ctx    = canvas.getContext('2d');
  const allPts = anim.strokes.flat();
  if (allPts.length < 2) return;
  const tStart = allPts[0].t, tEnd = allPts[allPts.length - 1].t;
  const duration = Math.max(1, tEnd - tStart);
  // Play at real speed, minimum 1 s
  const animDuration = Math.max(1000, duration);
  let startTime = performance.now();
  _isDetailPlaying = true;
  const btn = document.getElementById('btn-play');
  if (btn) { btn.textContent = '⏸ Pause'; btn.classList.add('active'); }

  function frame(now) {
    const progress = Math.min(1, (now - startTime) / animDuration);
    const tCur = tStart + progress * duration;
    ctx.clearRect(0, 0, 1200, 800);
    ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    anim.strokes.forEach(stroke => {
      if (!stroke.length) return;
      let started = false, active = false;
      ctx.beginPath();
      for (const p of stroke) {
        if (p.t > tCur) { active = true; break; }
        if (!started) { ctx.moveTo(p.x, p.y); started = true; } else ctx.lineTo(p.x, p.y);
      }
      if (started) {
        ctx.strokeStyle = active ? '#C0392B' : '#1A1A1E';
        ctx.stroke();
      }
    });
    const pe = document.getElementById('anim-progress');
    if (pe) pe.textContent = `${Math.round(progress * 100)}%`;
    if (progress < 1) {
      _isDetailAnimId = requestAnimationFrame(frame);
    } else {
      _isDetailPlaying = false;
      if (btn) { btn.textContent = '▶ Play'; btn.classList.remove('active'); }
    }
  }
  _isDetailAnimId = requestAnimationFrame(frame);
}
</script>
<div id="ann-data-modal">
  <div id="ann-data-modal-box">
    <div id="ann-data-modal-toolbar">
      <h3>All annotation data</h3>
      <span class="spacer"></span>
      <button onclick="annDataCopy()" style="padding:0.2rem 0.6rem;cursor:pointer;">Copy JSON</button>
      <button onclick="annDataClose()" style="padding:0.2rem 0.6rem;cursor:pointer;">✕ Close</button>
    </div>
    <pre id="ann-data-modal-pre"></pre>
  </div>
</div>
