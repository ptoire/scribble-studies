<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Taxonomy of Children's Scribbles — After Kellogg (1969)</title>
<style>
/* ═══════════════════════════════════════════════════════════
   TYPOGRAPHY
   ═══════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600&display=swap');

:root {
  --font-display: 'Cormorant Garamond', 'Georgia', serif;
  --font-body: 'DM Sans', 'Helvetica Neue', sans-serif;
  --font-mono: 'IBM Plex Mono', 'Consolas', monospace;

  --c-bg: #FAFAF7;
  --c-bg-warm: #F5F4F0;
  --c-bg-card: #FFFFFF;
  --c-text: #1A1A1E;
  --c-text-secondary: #5A5A64;
  --c-text-tertiary: #8A8A96;
  --c-border: #D8D8DC;
  --c-border-light: #ECECEE;
  --c-accent: #2C3E50;
  --c-accent-light: #3498DB;
  --c-tag-bg: #EEEEE8;
  --c-tag-text: #4A4A54;
  --c-group-A: #C0392B;
  --c-group-B: #8E44AD;
  --c-group-C: #2980B9;
  --c-group-D: #27AE60;
  --c-group-E: #D35400;
  --c-group-F: #16A085;
  --c-group-G: #2C3E50;
  --c-group-H: #F39C12;
  --c-group-I: #7F8C8D;
  --c-canvas: #FFFFFF;
  --c-stroke: #1A1A1E;
  --c-stroke-anim: #C0392B;
  --c-maurer-accent: #5C3D2E;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  color: var(--c-text);
  background: var(--c-bg);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════════════════ */
.site-header {
  padding: 4rem 2rem 3rem;
  text-align: center;
  border-bottom: 1px solid var(--c-border);
  background: linear-gradient(180deg, #F0EDE6 0%, var(--c-bg) 100%);
}
.site-header h1 {
  font-family: var(--font-display);
  font-size: clamp(2rem, 4vw, 3.2rem);
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.2;
  color: var(--c-text);
  margin-bottom: 0.5rem;
}
.site-header .subtitle {
  font-family: var(--font-display);
  font-size: clamp(1rem, 2vw, 1.4rem);
  font-weight: 400;
  font-style: italic;
  color: var(--c-text-secondary);
  margin-bottom: 1.5rem;
}
.site-header .meta-info {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--c-text-tertiary);
  letter-spacing: 0.05em;
}

/* ═══════════════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════════════ */
.nav-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(250, 250, 247, 0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--c-border-light);
  padding: 0.6rem 1rem;
  display: flex;
  gap: 0.4rem;
  overflow-x: auto;
  justify-content: center;
  flex-wrap: wrap;
}
.nav-btn {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 500;
  padding: 0.35rem 0.7rem;
  border: 1px solid var(--c-border);
  border-radius: 3px;
  background: var(--c-bg-card);
  color: var(--c-text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.nav-btn:hover { background: var(--c-accent); color: #fff; border-color: var(--c-accent); }
.nav-btn.active { background: var(--c-text); color: #fff; border-color: var(--c-text); }

/* ═══════════════════════════════════════════════════════════
   MAIN
   ═══════════════════════════════════════════════════════════ */
.main { max-width: 1400px; margin: 0 auto; padding: 0 1.5rem 4rem; }

/* ═══════════════════════════════════════════════════════════
   GROUP SECTIONS
   ═══════════════════════════════════════════════════════════ */
.group-section { margin-top: 3rem; padding-top: 1.5rem; }
.group-header {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  margin-bottom: 1.5rem;
  padding-bottom: 0.8rem;
  border-bottom: 2px solid var(--c-text);
}
.group-letter {
  font-family: var(--font-display);
  font-size: 3rem;
  font-weight: 700;
  line-height: 1;
  color: var(--c-text);
}
.group-name {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 500;
  color: var(--c-text);
}
.group-count {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--c-text-tertiary);
  margin-left: auto;
}

/* ═══════════════════════════════════════════════════════════
   CARD GRID
   ═══════════════════════════════════════════════════════════ */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1.2rem;
}
.card {
  background: var(--c-bg-card);
  border: 1px solid var(--c-border-light);
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow 0.25s, transform 0.25s;
  position: relative;
}
.card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.card-canvas-wrap {
  position: relative;
  width: 100%;
  padding-top: 100%;
  background: var(--c-canvas);
  overflow: hidden;
}
.card-canvas-wrap img {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  max-width: 85%; max-height: 85%;
  object-fit: contain;
}
.card-canvas-wrap canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  opacity: 0;
  transition: opacity 0.3s;
}
.card:hover .card-canvas-wrap canvas { opacity: 1; }
.card:hover .card-canvas-wrap img { opacity: 0.15; }
.card-info {
  padding: 0.6rem 0.8rem;
  border-top: 1px solid var(--c-border-light);
}
.card-code {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--c-text-tertiary);
  letter-spacing: 0.04em;
}
.card-name {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 600;
  color: var(--c-text);
  line-height: 1.3;
  margin-top: 0.15rem;
}
.card-stats {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--c-text-tertiary);
  margin-top: 0.3rem;
}
.card.missing { opacity: 0.4; cursor: default; }
.card.missing .card-canvas-wrap { display: flex; align-items: center; justify-content: center; }
.card.missing .card-canvas-wrap::after {
  content: 'Not yet recorded';
  position: absolute;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--c-text-tertiary);
}

/* ═══════════════════════════════════════════════════════════
   DETAIL OVERLAY
   ═══════════════════════════════════════════════════════════ */
.overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 200;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  overflow-y: auto;
  padding: 2rem;
}
.overlay.active { display: flex; justify-content: center; align-items: flex-start; }
.detail-panel {
  background: var(--c-bg-card);
  border-radius: 6px;
  max-width: 900px;
  width: 100%;
  margin: 2rem auto;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}
.detail-close {
  position: absolute;
  top: 1rem; right: 1.5rem;
  font-size: 1.8rem;
  background: none; border: none;
  cursor: pointer;
  color: var(--c-text-secondary);
  z-index: 10; line-height: 1;
}
.detail-header {
  padding: 2rem 2.5rem 1.5rem;
  border-bottom: 1px solid var(--c-border-light);
  position: relative;
}
.detail-code {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--c-text-tertiary);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.detail-name {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 600;
  margin-top: 0.3rem;
}
.detail-group-tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  padding: 0.2rem 0.6rem;
  background: var(--c-tag-bg);
  color: var(--c-tag-text);
  border-radius: 3px;
  margin-top: 0.5rem;
  letter-spacing: 0.03em;
}
.detail-body { display: flex; flex-wrap: wrap; }
.detail-canvas-section {
  flex: 1 1 400px;
  padding: 2rem;
  background: var(--c-bg-warm);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
}
.detail-canvas-container {
  background: var(--c-canvas);
  border: 1px solid var(--c-border);
  border-radius: 3px;
  position: relative;
  width: 100%; max-width: 500px;
}
.detail-canvas-container canvas { display: block; width: 100%; height: auto; }
.anim-controls { display: flex; gap: 0.5rem; align-items: center; }
.anim-btn {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.4rem 1rem;
  border: 1px solid var(--c-border);
  border-radius: 3px;
  background: var(--c-bg-card);
  cursor: pointer;
  transition: all 0.15s;
}
.anim-btn:hover { background: var(--c-accent); color: #fff; }
.anim-btn.active { background: var(--c-text); color: #fff; }
.anim-progress { font-family: var(--font-mono); font-size: 0.7rem; color: var(--c-text-tertiary); }
.detail-info-section { flex: 1 1 300px; padding: 2rem; }
.detail-info-section h3 {
  font-family: var(--font-display);
  font-size: 1.1rem; font-weight: 600;
  margin-bottom: 0.5rem; margin-top: 1.5rem;
  color: var(--c-text);
}
.detail-info-section h3:first-child { margin-top: 0; }
.info-row {
  display: flex;
  justify-content: space-between;
  padding: 0.35rem 0;
  border-bottom: 1px solid var(--c-border-light);
  font-size: 0.85rem;
}
.info-label { font-family: var(--font-mono); font-size: 0.75rem; color: var(--c-text-tertiary); }
.info-value { font-weight: 500; }
.maurer-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.5rem; }
.maurer-tag {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  padding: 0.25rem 0.5rem;
  background: var(--c-tag-bg);
  border: 1px solid var(--c-border-light);
  border-radius: 3px;
  color: var(--c-tag-text);
  cursor: pointer;
  transition: all 0.15s;
}
.maurer-tag:hover { background: var(--c-maurer-accent); color: #fff; }
.maurer-tag.active { background: var(--c-maurer-accent); color: #fff; }
.maurer-carousel-nav { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.35rem; }
.maurer-nav-btn { font-size: 1rem; background: none; border: 1px solid var(--c-border); border-radius: 3px; width: 1.5rem; height: 1.5rem; cursor: pointer; flex-shrink: 0; color: var(--c-text-secondary); display: flex; align-items: center; justify-content: center; padding: 0; line-height: 1; }
.maurer-nav-btn:hover { background: var(--c-border-light); }
.maurer-carousel-label { font-family: var(--font-mono); font-size: 0.68rem; color: var(--c-text-secondary); flex: 1; text-align: center; }

/* ═══════════════════════════════════════════════════════════
   MAURER T–C ANNOTATION SECTION
   ═══════════════════════════════════════════════════════════ */
.maurer-section {
  margin-top: 4rem;
  padding-top: 2rem;
  border-top: 2px solid var(--c-text);
}
.maurer-section h2 {
  font-family: var(--font-display);
  font-size: 2rem; font-weight: 500;
  margin-bottom: 0.4rem;
}
.maurer-section .section-subtitle {
  font-family: var(--font-display);
  font-style: italic;
  color: var(--c-text-secondary);
  margin-bottom: 0.5rem;
  font-size: 1.1rem;
}
.maurer-section .section-source {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--c-text-tertiary);
  margin-bottom: 1.8rem;
  letter-spacing: 0.02em;
}
.maurer-section .section-source em {
  font-style: italic;
  font-family: var(--font-display);
  font-size: 0.85rem;
}
.maurer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1rem;
}
.maurer-card {
  background: var(--c-bg-card);
  border: 1px solid var(--c-border-light);
  border-radius: 4px;
  padding: 1.2rem;
  transition: box-shadow 0.2s;
}
.maurer-card:hover { box-shadow: var(--shadow-sm); }
.maurer-card-code {
  font-family: var(--font-mono);
  font-size: 0.75rem; font-weight: 500;
  color: var(--c-maurer-accent);
  letter-spacing: 0.04em;
}
.maurer-card-name {
  font-family: var(--font-display);
  font-size: 1.15rem; font-weight: 600;
  margin-top: 0.2rem;
}
.maurer-card-german {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--c-text-tertiary);
  margin-top: 0.15rem;
  font-style: italic;
}
.maurer-card-desc {
  font-size: 0.85rem;
  color: var(--c-text-secondary);
  margin-top: 0.5rem;
  line-height: 1.5;
}

/* ═══════════════════════════════════════════════════════════
   BAND 3 DOCUMENTATION SECTION
   ═══════════════════════════════════════════════════════════ */
.band3-section {
  margin-top: 4rem;
  padding-top: 2rem;
  border-top: 1px solid var(--c-border);
}
.band3-section h2 {
  font-family: var(--font-display);
  font-size: 2rem; font-weight: 500;
  margin-bottom: 0.4rem;
}
.band3-section .section-subtitle {
  font-family: var(--font-display);
  font-style: italic;
  color: var(--c-text-secondary);
  font-size: 1.1rem;
  margin-bottom: 0.5rem;
}
.band3-section .section-source {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--c-text-tertiary);
  margin-bottom: 0.6rem;
  letter-spacing: 0.02em;
}
.band3-section .section-note {
  font-size: 0.82rem;
  color: var(--c-text-secondary);
  margin-bottom: 2rem;
  max-width: 720px;
  line-height: 1.6;
  font-style: italic;
}
.band3-group {
  margin-bottom: 2.5rem;
}
.band3-group-header {
  display: flex;
  align-items: baseline;
  gap: 0.8rem;
  padding-bottom: 0.5rem;
  margin-bottom: 1rem;
  border-bottom: 1px solid var(--c-border);
}
.band3-group-code {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--c-maurer-accent);
  letter-spacing: 0.06em;
}
.band3-group-name {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 600;
}
.band3-group-en {
  font-family: var(--font-display);
  font-size: 1rem;
  font-style: italic;
  color: var(--c-text-secondary);
}
.band3-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}
.band3-table th {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  font-weight: 500;
  color: var(--c-text-tertiary);
  text-align: left;
  padding: 0.3rem 0.6rem;
  border-bottom: 1px solid var(--c-border);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.band3-table td {
  padding: 0.35rem 0.6rem;
  border-bottom: 1px solid var(--c-border-light);
  vertical-align: top;
  line-height: 1.4;
}
.band3-table td:first-child {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--c-maurer-accent);
  white-space: nowrap;
  font-weight: 500;
  padding-right: 1rem;
}
.band3-table td:nth-child(2) {
  font-style: italic;
  color: var(--c-text-secondary);
  padding-right: 1rem;
}
.band3-table td:nth-child(3) {
  color: var(--c-text);
}
.band3-table td:nth-child(4) {
  font-size: 0.78rem;
  color: var(--c-text-tertiary);
  font-style: italic;
}
.band3-table tr:hover td { background: var(--c-bg-warm); }
.band3-note-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 0.1rem 0.35rem;
  background: #F0EDE6;
  border: 1px solid #D8D0C8;
  border-radius: 2px;
  color: var(--c-text-tertiary);
  margin-left: 0.3rem;
  vertical-align: middle;
}

/* ═══════════════════════════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════════════════════════ */
.site-footer {
  margin-top: 4rem;
  padding: 2rem;
  text-align: center;
  border-top: 1px solid var(--c-border);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--c-text-tertiary);
  letter-spacing: 0.03em;
}

@media (max-width: 768px) {
  .site-header { padding: 2.5rem 1rem 2rem; }
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.8rem; }
  .detail-body { flex-direction: column; }
  .overlay { padding: 0.5rem; }
  .detail-panel { margin: 0.5rem auto; }
  .band3-table td:nth-child(4) { display: none; }
}

/* ═══════════════════════════════════════════════════════════
   ANNOTATOR
   ═══════════════════════════════════════════════════════════ */
.annotator-section {
  margin-top: 4rem;
  padding-top: 2rem;
  border-top: 2px solid var(--c-text);
}
.annotator-section h2 {
  font-family: var(--font-display);
  font-size: 2rem; font-weight: 500;
  margin-bottom: 0.4rem;
}
.annotator-section .section-subtitle {
  font-family: var(--font-display);
  font-style: italic;
  color: var(--c-text-secondary);
  margin-bottom: 1.5rem;
  font-size: 1.1rem;
}
.annotator-toolbar {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  margin-bottom: 1.5rem;
  padding: 0.8rem 1rem;
  background: var(--c-bg-warm);
  border: 1px solid var(--c-border-light);
  border-radius: 4px;
  flex-wrap: wrap;
}
.ann-counter-wrap { display: flex; flex-direction: column; flex: 1; min-width: 180px; }
.annotator-counter {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--c-text-secondary);
}
.annotator-progress-bar {
  width: 100%;
  height: 3px;
  background: var(--c-border);
  border-radius: 2px;
  margin-top: 0.35rem;
  overflow: hidden;
}
.annotator-progress-fill {
  height: 100%;
  background: #5C3D2E;
  border-radius: 2px;
  transition: width 0.4s;
}
.ann-btn {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 500;
  padding: 0.38rem 0.85rem;
  border: 1px solid var(--c-border);
  border-radius: 3px;
  background: var(--c-bg-card);
  color: var(--c-text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.03em;
  white-space: nowrap;
}
.ann-btn:hover { background: var(--c-accent); color: #fff; border-color: var(--c-accent); }
.ann-btn.ann-primary { background: var(--c-text); color: #fff; border-color: var(--c-text); }
.ann-btn.ann-primary:hover { background: #5C3D2E; border-color: #5C3D2E; }
.ann-btn.ann-export { color: #5C3D2E; border-color: #5C3D2E; }
.ann-btn.ann-export:hover { background: #5C3D2E; color: #fff; }
.annotator-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  align-items: start;
}
.annotator-image-panel {
  position: sticky;
  top: 4rem;
  background: var(--c-bg-warm);
  border: 1px solid var(--c-border-light);
  border-radius: 4px;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
}
.annotator-img-wrap {
  width: 100%;
  background: var(--c-canvas);
  border: 1px solid var(--c-border);
  border-radius: 3px;

/* ═══════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════ */
const BASE_URL = 'https://ptoire.github.io/kellogg-data/';
let INDEX_DATA = null;
let ANN_INDEX_DATA = null;
let ANIM_CACHE = {};
let cardAnimFrames = {};

/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
async function init() {
  try {
    const resp = await fetch(BASE_URL + 'data/index.json');
    INDEX_DATA = await resp.json();
  } catch(e) {
    document.getElementById('main').innerHTML =
      '<p style="padding:2rem;color:red;">Error loading data. Ensure data/index.json exists.</p>';
    return;
  }
  try {
    const r2 = await fetch(BASE_URL + 'data/annotator_index.json');
    ANN_INDEX_DATA = await r2.json();
  } catch(e) {
    ANN_INDEX_DATA = null;
  }
  // Load server-persisted annotations (merge: localStorage takes precedence)
  try {
    const r3 = await fetch('/api/annotations');
    if (r3.ok) {
      const srv = await r3.json();
      if (srv.maurer) {
        const loc = JSON.parse(localStorage.getItem('maurer_annotations') || '{}');
        localStorage.setItem('maurer_annotations', JSON.stringify({...srv.maurer, ...loc}));
      }
      if (srv.kellogg) {
        const loc = JSON.parse(localStorage.getItem(ANN_KEY) || '{}');
        localStorage.setItem(ANN_KEY, JSON.stringify({...srv.kellogg, ...loc}));
      }
    }
  } catch(e) {}
  buildNav();
  buildGrid();
  buildAnnotatorSection();
  buildMaurerAnnotationSection();
  buildBand3Section();
  buildFooter();
}

   NAVIGATION

    nav.appendChild(btn);

  mbtn.className = 'nav-btn';
  mbtn.textContent = '◈ Maurer T–C';
  mbtn.onclick = () => document.getElementById('maurer-section').scrollIntoView({behavior:'smooth'});
  nav.appendChild(mbtn);
  const bbtn = document.createElement('button');

  bbtn.textContent = '◉ Band 3 Catalogue';
  bbtn.onclick = () => document.getElementById('band3-section').scrollIntoView({behavior:'smooth'});
  nav.appendChild(bbtn);

  abtn.className = 'nav-btn';
  abtn.textContent = '✎ Annotator';
  abtn.onclick = () => document.getElementById('annotator-section').scrollIntoView({behavior:'smooth'});

/* ═══════════════════════════════════════════════════════════
   KELLOGG GRID
   ═══════════════════════════════════════════════════════════ */
function buildGrid() {
  const main = document.getElementById('main');
  const sessionMap = {};
  INDEX_DATA.sessions.forEach(s => { sessionMap[s.code] = s; });

  GROUP_ORDER.forEach(groupName => {
    const letter = GROUP_LETTERS[groupName];
    const prefix = `K-${letter}`;
    const taxItems = FULL_TAXONOMY[prefix];
    const section = document.createElement('section');
    section.className = 'group-section';
    section.id = `group-${letter}`;

    const present = Object.keys(taxItems).filter(n => sessionMap[`${prefix}-${n}`]);
    section.innerHTML = `
      <div class="group-header">
        <span class="group-letter">${letter}</span>
        <span class="group-name">${groupName}</span>
        <span class="group-count">${present.length} / ${Object.keys(taxItems).length} recorded</span>
      </div>
    `;

    const grid = document.createElement('div');
    grid.className = 'card-grid';

    Object.entries(taxItems).forEach(([num, name]) => {
      const code = `${prefix}-${num}`;
      const session = sessionMap[code];
      const card = document.createElement('div');

      if (session) {
        card.className = 'card';
        card.innerHTML = `
          <div class="card-canvas-wrap">
            <img src="${BASE_URL}img/${session.session_id}_thumb.png" alt="${name}" loading="lazy">
            <canvas data-sid="${session.session_id}"></canvas>
          </div>
          <div class="card-info">
            <div class="card-code">${code}</div>
            <div class="card-name">${name}</div>
            <div class="card-stats">${session.total_strokes} stroke${session.total_strokes!==1?'s':''} · ${session.total_points} points</div>
          </div>
        `;
        card.onclick = () => openDetail(session);
        card.onmouseenter = () => startCardAnim(card, session);
        card.onmouseleave = () => stopCardAnim(card);
      } else {
        card.className = 'card missing';
        card.innerHTML = `
          <div class="card-canvas-wrap"></div>
          <div class="card-info">
            <div class="card-code">${code}</div>
            <div class="card-name">${name}</div>
            <div class="card-stats">not recorded</div>
          </div>
        `;
      }
      grid.appendChild(card);
    });
    section.appendChild(grid);
    main.appendChild(section);
  });
}

/* ═══════════════════════════════════════════════════════════
   CARD ANIMATION
   ═══════════════════════════════════════════════════════════ */
async function startCardAnim(card, session) {
  const canvas = card.querySelector('canvas');
  if (!canvas) return;
  const sid = session.session_id;
  if (!ANIM_CACHE[sid]) {
    try {
      const resp = await fetch(BASE_URL + `data/${sid}_anim.json`);
      ANIM_CACHE[sid] = await resp.json();
    } catch(e) { return; }
  }
  const anim = ANIM_CACHE[sid];
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  const ctx = canvas.getContext('2d');
  const allPts = [];
  anim.strokes.forEach(s => s.forEach(p => allPts.push(p)));
  if (allPts.length < 2) return;
  const tStart = allPts[0].t, tEnd = allPts[allPts.length-1].t;
  const duration = tEnd - tStart;
  const animDuration = 2000;
  const scaleX = canvas.width / anim.w;
  const scaleY = canvas.height / anim.h;
  let startTime = performance.now();
  let animId;
  function drawFrame(now) {
    const progress = Math.min(1, (now - startTime) / animDuration);
    const tCurrent = tStart + progress * duration;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#C0392B';
    ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    anim.strokes.forEach(stroke => {
      let started = false; ctx.beginPath();
      for (const p of stroke) {
        if (p.t > tCurrent) break;
        if (!started) { ctx.moveTo(p.x*scaleX, p.y*scaleY); started = true; }
        else { ctx.lineTo(p.x*scaleX, p.y*scaleY); }
      }
      if (started) ctx.stroke();
    });
    if (progress < 1) { animId = requestAnimationFrame(drawFrame); }
    else { setTimeout(() => { if (cardAnimFrames[sid]) { startTime = performance.now(); animId = requestAnimationFrame(drawFrame); cardAnimFrames[sid] = animId; } }, 800); }
    cardAnimFrames[sid] = animId;
  }
  animId = requestAnimationFrame(drawFrame);
  cardAnimFrames[sid] = animId;
}

function stopCardAnim(card) {
  const canvas = card.querySelector('canvas');
  if (!canvas) return;
  const sid = canvas.dataset.sid;
  if (cardAnimFrames[sid]) { cancelAnimationFrame(cardAnimFrames[sid]); delete cardAnimFrames[sid]; }
  const ctx = canvas.getContext('2d');
  if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
}

/* ═══════════════════════════════════════════════════════════
   MAURER AUTO-FILL
   Infer Band 3 codes from Kellogg taxonomy code.
   Only high-confidence mappings are included.
   ═══════════════════════════════════════════════════════════ */
function getMaurerAutoFill(code) {
  const D = '\u2013'; // en-dash used in Band 3 codes
  const result = [`T${D}DAA`, `T${D}EAA`]; // always: monochromatic, pen execution
  const parts = code.split('-');
  const group = parts.slice(0, 2).join('-'); // e.g. "K-B"
  const num   = parts[2] || '';              // e.g. "05"
  if (group === 'K-B') result.push(`T${D}CBA`);  // Placement Pattern
  if (group === 'K-G') result.push(`T${D}ADEC`); // Mandalas
  if (group === 'K-H') result.push(`T${D}AEI`);  // Suns → central body + radial extensions
  if (group === 'K-I') result.push(`T${D}AEE`);  // Radials → early radial arrangements
  if (group === 'K-A') {
    if (num === '01') result.push(`T${D}ACAC`);                          // Dot
    if (['02','03','04'].includes(num)) result.push(`T${D}ACAB`);        // Straight lines
    if (num === '05') result.push(`T${D}ACAA`);                          // Curved line
    if (num === '12') result.push(`T${D}ACADA`);                         // Zigzag/wavy
    if (num === '15') result.push(`T${D}ACAE`);                          // Spiral
  }
  if (group === 'K-D') {
    if (num === '02') result.push(`T${D}ACBCC`);  // Square/Rectangle → Rectangle
    if (num === '03') result.push(`T${D}ACBBA`);  // Circle/Oval → round closed form
    if (num === '04') result.push(`T${D}ACBCE`);  // Triangle
  }
  return result;
}

/* ═══════════════════════════════════════════════════════════
   DETAIL VIEW
   ═══════════════════════════════════════════════════════════ */
async function openDetail(session) {
  const overlay = document.getElementById('overlay');
  const panel = document.getElementById('detail-panel');
  const sid = session.session_id;
  if (!ANIM_CACHE[sid]) {
    try { const r = await fetch(BASE_URL + `data/${sid}_anim.json`); ANIM_CACHE[sid] = await r.json(); } catch(e) {}
  }
  const anim = ANIM_CACHE[sid];
  const rawW = anim ? anim.w : 500;
  const rawH = anim ? anim.h : 500;
  const renderScale = Math.max(2, Math.min(8, Math.round(600 / Math.max(rawW, rawH, 1))));
  panel.innerHTML = `
    <div class="detail-header">
      <button class="detail-close" onclick="closeDetail()">&times;</button>
      <div class="detail-code">${session.code}</div>
      <div class="detail-name">${session.name}</div>
      <span class="detail-group-tag">${session.group}</span>
    </div>
    <div class="detail-body">
      <div class="detail-canvas-section">
        <div class="detail-canvas-container">
          <canvas id="detail-canvas" width="${rawW * renderScale}" height="${rawH * renderScale}"></canvas>
        </div>
        <div class="anim-controls">
          <button class="anim-btn" id="btn-play" onclick="toggleDetailAnim()">▶ Play</button>
          <span class="anim-progress" id="anim-progress">0%</span>
        </div>
      </div>
      <div class="detail-info-section">
        <h3>Recording Data</h3>
        <div class="info-row"><span class="info-label">Session ID</span><span class="info-value">${sid}</span></div>
        <div class="info-row"><span class="info-label">Total Strokes</span><span class="info-value">${session.total_strokes}</span></div>
        <div class="info-row"><span class="info-label">Total Points</span><span class="info-value">${session.total_points}</span></div>
        <div class="info-row"><span class="info-label">Canvas Size</span><span class="info-value">${session.canvas_w} × ${session.canvas_h} px</span></div>
        <div class="info-row"><span class="info-label">Crop Size</span><span class="info-value">${session.crop_w} × ${session.crop_h} px</span></div>
        <div class="info-row"><span class="info-label">Recorded</span><span class="info-value">${new Date(session.timestamp).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</span></div>
        ${anim ? `<div class="info-row"><span class="info-label">Duration</span><span class="info-value">${getDuration(anim)}s</span></div>` : ''}
        <h3>Maurer Band 3</h3>
        <div class="maurer-carousel-nav">
          <button class="maurer-nav-btn" onclick="maurerNavShift(-1)">&#x2039;</button>
          <span class="maurer-carousel-label" id="maurer-group-label"></span>
          <button class="maurer-nav-btn" onclick="maurerNavShift(1)">&#x203a;</button>
        </div>
        <div class="maurer-tags" id="detail-maurer-tags"></div>
      </div>
    </div>
  `;

  detailMaurerSid = sid;
  detailMaurerGroupIdx = BAND3_GROUPS.findIndex(g => g.code === 'T\u2013C');
  if (detailMaurerGroupIdx < 0) detailMaurerGroupIdx = 0;
  // Auto-fill inferrable categories on first open
  if (getMaurerForSession(sid).length === 0) {
    const fill = getMaurerAutoFill(session.code);
    if (fill.length) saveMaurerForSession(sid, fill);
  }
  buildMaurerCarouselGroup(sid, detailMaurerGroupIdx);

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
  if (anim) drawStaticOnCanvas(anim);
}

function closeDetail() {
  stopDetailAnim();
  document.getElementById('overlay').classList.remove('active');
  document.body.style.overflow = '';
}

function getDuration(anim) {
  let tMin = Infinity, tMax = -Infinity;
  anim.strokes.forEach(s => s.forEach(p => { if(p.t<tMin)tMin=p.t; if(p.t>tMax)tMax=p.t; }));
  return (tMax - tMin).toFixed(1);
}

function drawStaticOnCanvas(anim) {
  const canvas = document.getElementById('detail-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const scaleX = canvas.width / anim.w;
  const scaleY = canvas.height / anim.h;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#1A1A1E'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  anim.strokes.forEach(stroke => {
    if (stroke.length < 2) return;
    ctx.beginPath(); ctx.moveTo(stroke[0].x * scaleX, stroke[0].y * scaleY);
    for (let i = 1; i < stroke.length; i++) ctx.lineTo(stroke[i].x * scaleX, stroke[i].y * scaleY);
    ctx.stroke();
  });
}

let detailAnimId = null, detailPlaying = false;

function toggleDetailAnim() {
  if (detailPlaying) { stopDetailAnim(); return; }
  const canvas = document.getElementById('detail-canvas');
  if (!canvas) return;
  const codeEl = document.querySelector('.detail-code');
  if (!codeEl) return;
  const session = INDEX_DATA.sessions.find(s => s.code === codeEl.textContent);
  if (!session) return;
  const anim = ANIM_CACHE[session.session_id];
  if (!anim) return;
  const ctx = canvas.getContext('2d');
  const allPts = [];
  anim.strokes.forEach(s => s.forEach(p => allPts.push(p)));
  if (allPts.length < 2) return;
  const tStart = allPts[0].t, tEnd = allPts[allPts.length-1].t;
  const duration = tEnd - tStart;
  const animDuration = Math.max(2000, duration * 400);
  let startTime = performance.now();
  detailPlaying = true;
  document.getElementById('btn-play').textContent = '⏸ Pause';
  document.getElementById('btn-play').classList.add('active');
  const scaleX = canvas.width / anim.w;
  const scaleY = canvas.height / anim.h;
  function drawFrame(now) {
    const progress = Math.min(1, (now - startTime) / animDuration);
    const tCurrent = tStart + progress * duration;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    anim.strokes.forEach(stroke => {
      let started = false, isActive = false; ctx.beginPath();
      for (const p of stroke) {
        if (p.t > tCurrent) { isActive = true; break; }
        if (!started) { ctx.moveTo(p.x * scaleX, p.y * scaleY); started = true; } else { ctx.lineTo(p.x * scaleX, p.y * scaleY); }
      }
      if (started) { ctx.strokeStyle = isActive ? '#C0392B' : '#1A1A1E'; ctx.stroke(); }
    });
    document.getElementById('anim-progress').textContent = `${Math.round(progress*100)}%`;
    if (progress < 1) { detailAnimId = requestAnimationFrame(drawFrame); }
    else { detailPlaying = false; document.getElementById('btn-play').textContent = '▶ Play'; document.getElementById('btn-play').classList.remove('active'); }
  }
  detailAnimId = requestAnimationFrame(drawFrame);
}

function stopDetailAnim() {
  if (detailAnimId) cancelAnimationFrame(detailAnimId);
  detailAnimId = null; detailPlaying = false;
  const btn = document.getElementById('btn-play');
  if (btn) { btn.textContent = '▶ Play'; btn.classList.remove('active'); }
}

function resetDetailAnim() {
  stopDetailAnim();
  const codeEl = document.querySelector('.detail-code');
  if (!codeEl) return;
  const session = INDEX_DATA.sessions.find(s => s.code === codeEl.textContent);
  if (session && ANIM_CACHE[session.session_id]) drawStaticOnCanvas(ANIM_CACHE[session.session_id]);
  document.getElementById('anim-progress').textContent = '0%';
}

/* ═══════════════════════════════════════════════════════════
   MAURER PERSISTENCE
   ═══════════════════════════════════════════════════════════ */
function getMaurerForSession(sid) {
  try { return JSON.parse(localStorage.getItem('maurer_annotations')||'{}')[sid] || []; } catch { return []; }
}
function saveMaurerForSession(sid, codes) {
  try { const d = JSON.parse(localStorage.getItem('maurer_annotations')||'{}'); d[sid]=codes; localStorage.setItem('maurer_annotations',JSON.stringify(d)); } catch {}
  postAnnotationsToServer();
}

/* ═══════════════════════════════════════════════════════════
   MAURER BAND 3 CAROUSEL (detail view)
   ═══════════════════════════════════════════════════════════ */
let detailMaurerSid = null;
let detailMaurerGroupIdx = 0;

function maurerNavShift(delta) {
  detailMaurerGroupIdx = (detailMaurerGroupIdx + delta + BAND3_GROUPS.length) % BAND3_GROUPS.length;
  buildMaurerCarouselGroup(detailMaurerSid, detailMaurerGroupIdx);
}

function buildMaurerCarouselGroup(sid, idx) {
  const g = BAND3_GROUPS[idx];
  const labelEl = document.getElementById('maurer-group-label');
  if (labelEl) labelEl.textContent = `${g.code} · ${g.english}  (${idx + 1}/${BAND3_GROUPS.length})`;
  const container = document.getElementById('detail-maurer-tags');
  if (!container) return;
  container.innerHTML = '';
  const tagRows = g.rows.length > 0 ? g.rows : [[g.code, g.german, g.english, '']];
  tagRows.forEach(row => {
    const code = row[0];
    const saved = getMaurerForSession(sid);
    const tag = document.createElement('span');
    tag.className = 'maurer-tag' + (saved.includes(code) ? ' active' : '');
    tag.textContent = code;
    tag.title = `${row[2]}\n${row[1]}`;
    tag.onclick = () => {
      tag.classList.toggle('active');
      const freshSaved = getMaurerForSession(sid);
      const otherCodes = freshSaved.filter(c => !tagRows.some(r => r[0] === c));
      const thisCodes = Array.from(container.querySelectorAll('.maurer-tag.active')).map(t => t.textContent);
      saveMaurerForSession(sid, [...otherCodes, ...thisCodes]);
    };
    container.appendChild(tag);
  });
}

/* ═══════════════════════════════════════════════════════════
   ANNOTATOR
   ═══════════════════════════════════════════════════════════ */
const ANN_KEY = 'kellogg_full_annotations';
let annIdx = 0;
let annItems = [];  // items from annotator_index.json

const ANN_GROUP_NAMES = { A:'Basic', B:'Placement', C:'Emergent', D:'Diagrams', E:'Combines', F:'Aggregates', G:'Mandalas', H:'Suns', I:'Radials' };
const ANN_NON_B = ['A','C','D','E','F','G','H','I'];

// Sort taxonomy entries numerically (fixes K-A-10 appearing before K-A-01)
function taxEntries(prefix) {
  return Object.entries(FULL_TAXONOMY[prefix]).sort((a, b) => parseInt(a[0], 10) - parseInt(b[0], 10));
}

function annStore() {
  try { return JSON.parse(localStorage.getItem(ANN_KEY) || '{}'); } catch { return {}; }
}
function annStoreSet(s) {
  try { localStorage.setItem(ANN_KEY, JSON.stringify(s)); } catch {}
  postAnnotationsToServer();
}
function postAnnotationsToServer() {
  try {
    const maurer  = JSON.parse(localStorage.getItem('maurer_annotations') || '{}');
    const kellogg = JSON.parse(localStorage.getItem(ANN_KEY) || '{}');
    fetch('/api/annotations', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({maurer, kellogg})
    }).catch(() => {});
  } catch {}
}

function annGet(sha) {
  const ls = annStore()[sha];
  if (ls) return ls;
  // fall back to seed from annotator_index.json
  const item = annItems.find(i => i.sha === sha);
  if (item) return {
    human_where:     item.human_where    || [],
    human_primary:   item.human_primary  || [],
    human_secondary: item.human_secondary|| [],
    maurer_tc:       item.maurer_tc      || [],
    status:          item.status         || 'seeded_unconfirmed',
    updated_at:      item.updated_at     || null,
  };
  return { human_where:[], human_primary:[], human_secondary:[], maurer_tc:[], status:'unconfirmed', updated_at:null };
}

function annSet(sha, data) {
  const store = annStore();
  store[sha] = { ...data, updated_at: new Date().toISOString() };
  annStoreSet(store);
}

function annCountDone() {
  const store = annStore();
  return annItems.filter(item => {
    const a = store[item.sha] || item;
    return a.human_where?.length || a.human_primary?.length || a.human_secondary?.length || a.maurer_tc?.length;
  }).length;
}

function exportAnnotationsJSON() {
  const store = annStore();
  const out = annItems.map(item => {
    const a = store[item.sha] || item;
    return {
      sha:             item.sha,
      img_url:         item.img_url,
      prefill_labels:  item.prefill_labels,
      human_where:     a.human_where     || [],
      human_primary:   a.human_primary   || [],
      human_secondary: a.human_secondary || [],
      maurer_tc:       a.maurer_tc       || [],
      status:          a.status          || 'unconfirmed',
      updated_at:      a.updated_at      || null,
    };
  });
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const el = document.createElement('a');
  el.href = url; el.download = 'kellogg_annotations.json';
  document.body.appendChild(el); el.click();
  document.body.removeChild(el);
  URL.revokeObjectURL(url);
}

function buildAnnotatorSection() {
  const main = document.getElementById('main');
  const section = document.createElement('section');
  section.className = 'annotator-section';
  section.id = 'annotator-section';

  if (!ANN_INDEX_DATA) {
    section.innerHTML = `
      <h2>Annotator</h2>
      <p class="section-subtitle">Dataset not generated yet.</p>
      <div style="padding:1.5rem;background:var(--c-bg-warm);border:1px solid var(--c-border-light);border-radius:4px;font-family:var(--font-mono);font-size:0.82rem;line-height:1.8;">
        run:<br>
        <strong>python build_annotator_data.py</strong><br><br>
        then run server:<br>
        <strong>python server.py</strong><br><br>
        e ricarica la pagina.
      </div>
    `;
    main.appendChild(section);
    return;
  }

  annItems = ANN_INDEX_DATA.items || [];

  section.innerHTML = `
    <h2>Annotator</h2>
    <p class="section-subtitle">Children's drawings from dataset Kellogg / Maurer · annote K-categories and Maurer T–C · export JSON </p>
    <div class="annotator-toolbar">
      <div class="ann-counter-wrap">
        <span class="annotator-counter" id="ann-counter">—</span>
        <div class="annotator-progress-bar"><div class="annotator-progress-fill" id="ann-pfill" style="width:0%"></div></div>
      </div>
      <button class="ann-btn" onclick="annNav(-1)">← Prev</button>
      <button class="ann-btn" onclick="annNav(1)">Next →</button>
      <button class="ann-btn ann-export" onclick="exportAnnotationsJSON()">⬇ Export JSON</button>
    </div>
    <div class="annotator-body">
      <div class="annotator-image-panel" id="ann-img-panel">
        <div class="annotator-img-wrap">
          <img id="ann-img" src="" alt="" style="max-width:100%;max-height:380px;object-fit:contain;">
        </div>
        <div class="annotator-img-meta">
          <div class="annotator-img-code" id="ann-meta-code">—</div>
          <div class="annotator-img-name" id="ann-meta-name" style="font-size:0.85rem;font-family:var(--font-mono);color:var(--c-text-secondary);margin-top:0.3rem;word-break:break-all;"></div>
          <div class="ann-status-badge s-unconfirmed" id="ann-status-badge">unconfirmed</div>
        </div>
      </div>
      <div class="annotator-panel" id="ann-panel"></div>
    </div>
  `;
  main.appendChild(section);
  annLoad(0);
}

function annNav(dir) {
  const n = annIdx + dir;
  if (n >= 0 && n < annItems.length) annLoad(n);
}

function annLoad(idx) {
  annIdx = idx;
  const item = annItems[idx];
  const sha = item.sha;
  const ann = annGet(sha);

  document.getElementById('ann-img').src = BASE_URL + item.img_url;
  document.getElementById('ann-img').alt = sha;
  document.getElementById('ann-meta-code').textContent = `${idx + 1} / ${annItems.length}`;
  document.getElementById('ann-meta-name').textContent = item.prefill_labels.length
    ? item.prefill_labels.join('  ·  ')
    : sha.slice(0, 16) + '…';
  annBadge(ann.status || 'unconfirmed');

  const done = annCountDone();
  document.getElementById('ann-counter').textContent = `${idx + 1} / ${annItems.length}  ·  ${done} annotated`;
  document.getElementById('ann-pfill').style.width = `${(done / annItems.length * 100).toFixed(1)}%`;

  annBuildPanel(item, ann);
}

function annBuildPanel(item, ann) {
  const panel = document.getElementById('ann-panel');

  // WHERE (K-B) — single-select, sorted numerically
  const whereTags = taxEntries('K-B').map(([num, name]) => {
    const code = `K-B-${num}`;
    const sel = ann.human_where.includes(code) ? ' sel-where' : '';
    return `<span class="ann-tag${sel}" data-code="${code}" title="${name}">${code}</span>`;
  }).join('');

  // PRIMARY — tabbed, single-select
  const primaryTabs = ANN_NON_B.map((l, i) =>
    `<button class="ann-macro-tab${i===0?' active':''}" data-letter="${l}" onclick="annTab(this,'primary')">${l}. ${ANN_GROUP_NAMES[l]}</button>`
  ).join('');
  const primaryGroups = ANN_NON_B.map((l, i) => {
    const tags = taxEntries(`K-${l}`).map(([num, name]) => {
      const code = `K-${l}-${num}`;
      const sel = ann.human_primary.includes(code) ? ' sel-primary' : '';
      return `<span class="ann-tag${sel}" data-code="${code}" title="${name}">${code}</span>`;
    }).join('');
    return `<div class="ann-tags" id="ann-pg-${l}" style="display:${i===0?'flex':'none'};flex-wrap:wrap;gap:0.28rem;">${tags}</div>`;
  }).join('');

  // SECONDARY — tabbed, multi-select
  const secTabs = ANN_NON_B.map((l, i) =>
    `<button class="ann-macro-tab${i===0?' active':''}" data-letter="${l}" onclick="annTab(this,'secondary')">${l}. ${ANN_GROUP_NAMES[l]}</button>`
  ).join('');
  const secGroups = ANN_NON_B.map((l, i) => {
    const tags = taxEntries(`K-${l}`).map(([num, name]) => {
      const code = `K-${l}-${num}`;
      const sel = ann.human_secondary.includes(code) ? ' sel-secondary' : '';
      return `<span class="ann-tag${sel}" data-code="${code}" title="${name}">${code}</span>`;
    }).join('');
    return `<div class="ann-tags" id="ann-sg-${l}" style="display:${i===0?'flex':'none'};flex-wrap:wrap;gap:0.28rem;">${tags}</div>`;
  }).join('');

  // MAURER T-C — multi-select
  const maurerTags = MAURER_TC.map(m => {
    const sel = (ann.maurer_tc || []).includes(m.code) ? ' sel-maurer' : '';
    return `<span class="ann-tag${sel}" data-code="${m.code}" title="${m.name} (${m.german}) — ${m.desc}">${m.code}</span>`;
  }).join('');

  // Prefill info row
  const prefillRow = item.prefill_labels.length
    ? `<div class="ann-section" style="background:var(--c-bg-warm);">
         <div class="ann-section-label">PREFILL · Original label(s)<span class="ann-hint">from the archive, read-only</span></div>
         <div class="ann-tags">${item.prefill_labels.map(c => `<span class="ann-tag" style="opacity:0.7;cursor:default;" title="${(ANN_INDEX_DATA.label_names||{})[c]||''}">${c}</span>`).join('')}</div>
       </div>` : '';

  panel.innerHTML = `
    ${prefillRow}
    <div class="ann-section">
      <div class="ann-section-label">WHERE · Placement Pattern<span class="ann-hint">single choice — K-B</span></div>
      <div class="ann-tags" id="ann-where-tags">${whereTags}</div>
    </div>
    <div class="ann-section">
      <div class="ann-section-label">PRIMARY · Kellogg Category<span class="ann-hint">single choice</span></div>
      <div class="ann-macro-tabs" id="ann-primary-tabs">${primaryTabs}</div>
      <div id="ann-primary-groups">${primaryGroups}</div>
    </div>
    <div class="ann-section">
      <div class="ann-section-label">SECONDARY · Additional Categories<span class="ann-hint">multiple</span></div>
      <div class="ann-macro-tabs" id="ann-secondary-tabs">${secTabs}</div>
      <div id="ann-secondary-groups">${secGroups}</div>
    </div>
    <div class="ann-section">
      <div class="ann-section-label">MAURER T–C · Spatial Arrangements<span class="ann-hint">multiple</span></div>
      <div class="ann-tags" id="ann-maurer-tags">${maurerTags}</div>
    </div>
    <div class="ann-save-bar">
      <button class="ann-btn ann-primary" onclick="annSave()">Save</button>
      <button class="ann-btn" onclick="annClear()">Clear</button>
      <span class="ann-save-feedback" id="ann-save-fb"></span>
    </div>
  `;

  annAttach('ann-where-tags', 'sel-where', false);
  ANN_NON_B.forEach(l => {
    annAttach(`ann-pg-${l}`, 'sel-primary', false);
    annAttach(`ann-sg-${l}`, 'sel-secondary', true);
  });
  annAttach('ann-maurer-tags', 'sel-maurer', true);
}

function annAttach(id, selClass, multi) {
  const container = document.getElementById(id);
  if (!container) return;
  container.querySelectorAll('.ann-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      if (multi) {
        tag.classList.toggle(selClass);
      } else {
        document.getElementById('ann-panel').querySelectorAll(`.ann-tag.${selClass}`).forEach(t => t.classList.remove(selClass));
        tag.classList.add(selClass);
      }
    });
  });
}

function annTab(btn, type) {
  const letter = btn.dataset.letter;
  const tabsId = type === 'primary' ? 'ann-primary-tabs' : 'ann-secondary-tabs';
  document.getElementById(tabsId).querySelectorAll('.ann-macro-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ANN_NON_B.forEach(l => {
    const el = document.getElementById(`ann-${type==='primary'?'pg':'sg'}-${l}`);
    if (el) el.style.display = l === letter ? 'flex' : 'none';
  });
}

function annSelCodes(selector) {
  return Array.from(document.querySelectorAll(selector)).map(t => t.dataset.code).filter(Boolean);
}

function annSave() {
  const sha = annItems[annIdx].sha;
  const human_where     = annSelCodes('#ann-where-tags .ann-tag.sel-where');
  const human_primary   = annSelCodes('#ann-panel .ann-tag.sel-primary');
  const human_secondary = annSelCodes('#ann-panel .ann-tag.sel-secondary').filter(c => !human_primary.includes(c));
  const maurer_tc       = annSelCodes('#ann-maurer-tags .ann-tag.sel-maurer');
  const hasData = human_where.length || human_primary.length || human_secondary.length || maurer_tc.length;
  const status = hasData ? 'confirmed' : 'unconfirmed';
  annSet(sha, { human_where, human_primary, human_secondary, maurer_tc, status });
  annBadge(status);
  const done = annCountDone();
  document.getElementById('ann-counter').textContent = `${annIdx + 1} / ${annItems.length}  ·  ${done} annotated`;
  document.getElementById('ann-pfill').style.width = `${(done / annItems.length * 100).toFixed(1)}%`;
  const fb = document.getElementById('ann-save-fb');
  fb.textContent = 'Saved ✓';
  setTimeout(() => { if (fb) fb.textContent = ''; }, 2000);
}

function annClear() {
  annSet(annItems[annIdx].sha, { human_where:[], human_primary:[], human_secondary:[], maurer_tc:[], status:'unconfirmed' });
  annLoad(annIdx);
}

function annBadge(status) {
  const badge = document.getElementById('ann-status-badge');
  if (!badge) return;
  badge.className = 'ann-status-badge';
  const map = { unconfirmed:'s-unconfirmed', confirmed:'s-confirmed', modified:'s-modified', seeded_unconfirmed:'s-unconfirmed' };
  badge.classList.add(map[status] || 's-unconfirmed');
  badge.textContent = status.replace('seeded_', '');
}
