<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Taxonomy of Children's Scribbles — After Kellogg (1969)</title>
<style>
/* ═══════════════════════════════════════════════════════════
   TYPOGRAPHY
   ═══════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600&display=swap');

:root {
  --font-display: 'Cormorant Garamond', 'Georgia', serif;
  --font-body: 'DM Sans', 'Helvetica Neue', sans-serif;
  --font-mono: 'IBM Plex Mono', 'Consolas', monospace;

  --c-bg: #FAFAF7;
  --c-bg-warm: #F5F4F0;
  --c-bg-card: #FFFFFF;
  --c-text: #1A1A1E;
  --c-text-secondary: #5A5A64;
  --c-text-tertiary: #8A8A96;
  --c-border: #D8D8DC;
  --c-border-light: #ECECEE;
  --c-accent: #2C3E50;
  --c-accent-light: #3498DB;
  --c-tag-bg: #EEEEE8;
  --c-tag-text: #4A4A54;
  --c-group-A: #C0392B;
  --c-group-B: #8E44AD;
  --c-group-C: #2980B9;
  --c-group-D: #27AE60;
  --c-group-E: #D35400;
  --c-group-F: #16A085;
  --c-group-G: #2C3E50;
  --c-group-H: #F39C12;
  --c-group-I: #7F8C8D;
  --c-canvas: #FFFFFF;
  --c-stroke: #1A1A1E;
  --c-stroke-anim: #C0392B;
  --c-maurer-accent: #5C3D2E;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  color: var(--c-text);
  background: var(--c-bg);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════════════════ */
.site-header {
  padding: 4rem 2rem 3rem;
  text-align: center;
  border-bottom: 1px solid var(--c-border);
  background: linear-gradient(180deg, #F0EDE6 0%, var(--c-bg) 100%);
}
.site-header h1 {
  font-family: var(--font-display);
  font-size: clamp(2rem, 4vw, 3.2rem);
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.2;
  color: var(--c-text);
  margin-bottom: 0.5rem;
}
.site-header .subtitle {
  font-family: var(--font-display);
  font-size: clamp(1rem, 2vw, 1.4rem);
  font-weight: 400;
  font-style: italic;
  color: var(--c-text-secondary);
  margin-bottom: 1.5rem;
}
.site-header .meta-info {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--c-text-tertiary);
  letter-spacing: 0.05em;
}

/* ═══════════════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════════════ */
.nav-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(250, 250, 247, 0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--c-border-light);
  padding: 0.6rem 1rem;
  display: flex;
  gap: 0.4rem;
  overflow-x: auto;
  justify-content: center;
  flex-wrap: wrap;
}
.nav-btn {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 500;
  padding: 0.35rem 0.7rem;
  border: 1px solid var(--c-border);
  border-radius: 3px;
  background: var(--c-bg-card);
  color: var(--c-text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.nav-btn:hover { background: var(--c-accent); color: #fff; border-color: var(--c-accent); }
.nav-btn.active { background: var(--c-text); color: #fff; border-color: var(--c-text); }

/* ═══════════════════════════════════════════════════════════
   MAIN
   ═══════════════════════════════════════════════════════════ */
.main { max-width: 1400px; margin: 0 auto; padding: 0 1.5rem 4rem; }

/* ═══════════════════════════════════════════════════════════
   GROUP SECTIONS
   ═══════════════════════════════════════════════════════════ */
.group-section { margin-top: 3rem; padding-top: 1.5rem; }
.group-header {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  margin-bottom: 1.5rem;
  padding-bottom: 0.8rem;
  border-bottom: 2px solid var(--c-text);
}
.group-letter {
  font-family: var(--font-display);
  font-size: 3rem;
  font-weight: 700;
  line-height: 1;
  color: var(--c-text);
}
.group-name {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 500;
  color: var(--c-text);
}
.group-count {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--c-text-tertiary);
  margin-left: auto;
}

/* ═══════════════════════════════════════════════════════════
   CARD GRID
   ═══════════════════════════════════════════════════════════ */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1.2rem;
}
.card {
  background: var(--c-bg-card);
  border: 1px solid var(--c-border-light);
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow 0.25s, transform 0.25s;
  position: relative;
}
.card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.card-canvas-wrap {
  position: relative;
  width: 100%;
  padding-top: 100%;
  background: var(--c-canvas);
  overflow: hidden;
}
.card-canvas-wrap img {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  max-width: 85%; max-height: 85%;
  object-fit: contain;
}
.card-canvas-wrap canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  opacity: 0;
  transition: opacity 0.3s;
}
.card:hover .card-canvas-wrap canvas { opacity: 1; }
.card:hover .card-canvas-wrap img { opacity: 0.15; }
.card-info {
  padding: 0.6rem 0.8rem;
  border-top: 1px solid var(--c-border-light);
}
.card-code {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--c-text-tertiary);
  letter-spacing: 0.04em;
}
.card-name {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 600;
  color: var(--c-text);
  line-height: 1.3;
  margin-top: 0.15rem;
}
.card-stats {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--c-text-tertiary);
  margin-top: 0.3rem;
}
.card.missing { opacity: 0.4; cursor: default; }
.card.missing .card-canvas-wrap { display: flex; align-items: center; justify-content: center; }
.card.missing .card-canvas-wrap::after {
  content: 'Not yet recorded';
  position: absolute;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--c-text-tertiary);
}

/* ═══════════════════════════════════════════════════════════
   DETAIL OVERLAY
   ═══════════════════════════════════════════════════════════ */
.overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 200;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  overflow-y: auto;
  padding: 2rem;
}
.overlay.active { display: flex; justify-content: center; align-items: flex-start; }
.detail-panel {
  background: var(--c-bg-card);
  border-radius: 6px;
  max-width: 900px;
  width: 100%;
  margin: 2rem auto;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}
.detail-close {
  position: absolute;
  top: 1rem; right: 1.5rem;
  font-size: 1.8rem;
  background: none; border: none;
  cursor: pointer;
  color: var(--c-text-secondary);
  z-index: 10; line-height: 1;
}
.detail-header {
  padding: 2rem 2.5rem 1.5rem;
  border-bottom: 1px solid var(--c-border-light);
  position: relative;
}
.detail-code {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--c-text-tertiary);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.detail-name {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 600;
  margin-top: 0.3rem;
}
.detail-group-tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  padding: 0.2rem 0.6rem;
  background: var(--c-tag-bg);
  color: var(--c-tag-text);
  border-radius: 3px;
  margin-top: 0.5rem;
  letter-spacing: 0.03em;
}
.detail-body { display: flex; flex-wrap: wrap; }
.detail-canvas-section {
  flex: 1 1 400px;
  padding: 2rem;
  background: var(--c-bg-warm);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
}
.detail-canvas-container {
  background: var(--c-canvas);
  border: 1px solid var(--c-border);
  border-radius: 3px;
  position: relative;
  width: 100%; max-width: 500px;
}
.detail-canvas-container canvas { display: block; width: 100%; height: auto; }
.anim-controls { display: flex; gap: 0.5rem; align-items: center; }
.anim-btn {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.4rem 1rem;
  border: 1px solid var(--c-border);
  border-radius: 3px;
  background: var(--c-bg-card);
  cursor: pointer;
  transition: all 0.15s;
}
.anim-btn:hover { background: var(--c-accent); color: #fff; }
.anim-btn.active { background: var(--c-text); color: #fff; }
.anim-progress { font-family: var(--font-mono); font-size: 0.7rem; color: var(--c-text-tertiary); }
.detail-info-section { flex: 1 1 300px; padding: 2rem; }
.detail-info-section h3 {
  font-family: var(--font-display);
  font-size: 1.1rem; font-weight: 600;
  margin-bottom: 0.5rem; margin-top: 1.5rem;
  color: var(--c-text);
}
.detail-info-section h3:first-child { margin-top: 0; }
.detail-section-label {
  font-family:var(--font-mono); font-size:0.58rem; font-weight:700;
  letter-spacing:0.1em; text-transform:uppercase; color:var(--c-text-tertiary);
  margin:1rem 0 0.35rem;
}
.detail-drawing-scene {
  font-family:var(--font-display); font-size:1rem; font-style:italic;
  color:var(--c-text); line-height:1.75; margin-bottom:0.7rem;
}
.detail-drawing-instructions {
  font-family:var(--font-body); font-size:0.8rem; color:var(--c-text-secondary);
  line-height:1.7; padding:0.5rem 0.7rem;
  background:var(--c-bg-warm); border-left:3px solid var(--c-border); border-radius:0 3px 3px 0;
}
.info-row {
  display: flex;
  justify-content: space-between;
  padding: 0.35rem 0;
  border-bottom: 1px solid var(--c-border-light);
  font-size: 0.85rem;
}
.info-label { font-family: var(--font-mono); font-size: 0.75rem; color: var(--c-text-tertiary); }
.info-value { font-weight: 500; }
.maurer-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.5rem; }
.maurer-tag {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  padding: 0.25rem 0.5rem;
  background: var(--c-tag-bg);
  border: 1px solid var(--c-border-light);
  border-radius: 3px;
  color: var(--c-tag-text);
  cursor: pointer;
  transition: all 0.15s;
}
.maurer-tag:hover { background: var(--c-maurer-accent); color: #fff; }
.maurer-tag.active { background: var(--c-maurer-accent); color: #fff; }
.maurer-carousel-nav { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.35rem; }
.maurer-nav-btn { font-size: 1rem; background: none; border: 1px solid var(--c-border); border-radius: 3px; width: 1.5rem; height: 1.5rem; cursor: pointer; flex-shrink: 0; color: var(--c-text-secondary); display: flex; align-items: center; justify-content: center; padding: 0; line-height: 1; }
.maurer-nav-btn:hover { background: var(--c-border-light); }
.maurer-carousel-label { font-family: var(--font-mono); font-size: 0.68rem; color: var(--c-text-secondary); flex: 1; text-align: center; }

/* ═══════════════════════════════════════════════════════════
   MAURER T–C ANNOTATION SECTION
   ═══════════════════════════════════════════════════════════ */
.maurer-section {
  margin-top: 4rem;
  padding-top: 2rem;
  border-top: 2px solid var(--c-text);
}
.maurer-section h2 {
  font-family: var(--font-display);
  font-size: 2rem; font-weight: 500;
  margin-bottom: 0.4rem;
}
.maurer-section .section-subtitle {
  font-family: var(--font-display);
  font-style: italic;
  color: var(--c-text-secondary);
  margin-bottom: 0.5rem;
  font-size: 1.1rem;
}
.maurer-section .section-source {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--c-text-tertiary);
  margin-bottom: 1.8rem;
  letter-spacing: 0.02em;
}
.maurer-section .section-source em {
  font-style: italic;
  font-family: var(--font-display);
  font-size: 0.85rem;
}
.maurer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1rem;
}
.maurer-card {
  background: var(--c-bg-card);
  border: 1px solid var(--c-border-light);
  border-radius: 4px;
  padding: 1.2rem;
  transition: box-shadow 0.2s;
}
.maurer-card:hover { box-shadow: var(--shadow-sm); }
.maurer-card-code {
  font-family: var(--font-mono);
  font-size: 0.75rem; font-weight: 500;
  color: var(--c-maurer-accent);
  letter-spacing: 0.04em;
}
.maurer-card-name {
  font-family: var(--font-display);
  font-size: 1.15rem; font-weight: 600;
  margin-top: 0.2rem;
}
.maurer-card-german {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--c-text-tertiary);
  margin-top: 0.15rem;
  font-style: italic;
}
.maurer-card-desc {
  font-size: 0.85rem;
  color: var(--c-text-secondary);
  margin-top: 0.5rem;
  line-height: 1.5;
}

/* ═══════════════════════════════════════════════════════════
   BAND 3 DOCUMENTATION SECTION
   ═══════════════════════════════════════════════════════════ */
.band3-section {
  margin-top: 4rem;
  padding-top: 2rem;
  border-top: 1px solid var(--c-border);
}
.band3-section h2 {
  font-family: var(--font-display);
  font-size: 2rem; font-weight: 500;
  margin-bottom: 0.4rem;
}
.band3-section .section-subtitle {
  font-family: var(--font-display);
  font-style: italic;
  color: var(--c-text-secondary);
  font-size: 1.1rem;
  margin-bottom: 0.5rem;
}
.band3-section .section-source {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--c-text-tertiary);
  margin-bottom: 0.6rem;
  letter-spacing: 0.02em;
}
.band3-section .section-note {
  font-size: 0.82rem;
  color: var(--c-text-secondary);
  margin-bottom: 2rem;
  max-width: 720px;
  line-height: 1.6;
  font-style: italic;
}
.band3-group {
  margin-bottom: 2.5rem;
}
.band3-group-header {
  display: flex;
  align-items: baseline;
  gap: 0.8rem;
  padding-bottom: 0.5rem;
  margin-bottom: 1rem;
  border-bottom: 1px solid var(--c-border);
}
.band3-group-code {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--c-maurer-accent);
  letter-spacing: 0.06em;
}
.band3-group-name {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 600;
}
.band3-group-en {
  font-family: var(--font-display);
  font-size: 1rem;
  font-style: italic;
  color: var(--c-text-secondary);
}
.band3-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}
.band3-table th {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  font-weight: 500;
  color: var(--c-text-tertiary);
  text-align: left;
  padding: 0.3rem 0.6rem;
  border-bottom: 1px solid var(--c-border);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.band3-table td {
  padding: 0.35rem 0.6rem;
  border-bottom: 1px solid var(--c-border-light);
  vertical-align: top;
  line-height: 1.4;
}
.band3-table td:first-child {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--c-maurer-accent);
  white-space: nowrap;
  font-weight: 500;
  padding-right: 1rem;
}
.band3-table td:nth-child(2) {
  font-style: italic;
  color: var(--c-text-secondary);
  padding-right: 1rem;
}
.band3-table td:nth-child(3) {
  color: var(--c-text);
}
.band3-table td:nth-child(4) {
  font-size: 0.78rem;
  color: var(--c-text-tertiary);
  font-style: italic;
}
.band3-table tr:hover td { background: var(--c-bg-warm); }
.band3-note-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 0.1rem 0.35rem;
  background: #F0EDE6;
  border: 1px solid #D8D0C8;
  border-radius: 2px;
  color: var(--c-text-tertiary);
  margin-left: 0.3rem;
  vertical-align: middle;
}

/* ═══════════════════════════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════════════════════════ */
.site-footer {
  margin-top: 4rem;
  padding: 2rem;
  text-align: center;
  border-top: 1px solid var(--c-border);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--c-text-tertiary);
  letter-spacing: 0.03em;
}

@media (max-width: 768px) {
  .site-header { padding: 2.5rem 1rem 2rem; }

  .overlay { padding: 0.5rem; }

}

/* ── Archive section ─────────────────────────────────────────────────────── */

}

}
.archive-section .section-subtitle {

}
.archive-section .section-source {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--c-text-tertiary);

  margin-bottom: 0.4rem;
}

}

}

}
.archive-section .section-note details[open] summary { margin-bottom: 0.4rem; }
.arch-filters { margin-bottom: 1.2rem; }
.arch-clear-row { display:flex; align-items:center; gap:0.6rem; margin-bottom:0.7rem; }
.arch-clear-btn { font-size:0.75rem; font-family:var(--font-mono); padding:0.2em 0.7em;
  border:1px solid var(--c-border); border-radius:3px; background:var(--c-bg-warm);
  cursor:pointer; color:var(--c-text-secondary); }
.arch-clear-btn:hover { background:var(--c-border); }
.arch-selected-count { font-size:0.75rem; font-family:var(--font-mono); color:var(--c-text-secondary); }
.arch-group { margin-bottom:0.5rem; }
.arch-group-name { font-size:0.72rem; font-family:var(--font-mono); font-weight:700;
  letter-spacing:0.08em; text-transform:uppercase; color:var(--c-text-secondary);
  margin-bottom:0.3rem; }
.arch-codes { display:flex; flex-wrap:wrap; gap:0.22rem; }

.arch-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem; margin-top:0.8rem; }

.arch-chip { font-size:0.68rem; font-family:var(--font-mono); padding:0.1em 0.35em;

.arch-empty { padding:2rem; text-align:center; color:var(--c-text-secondary);

/* ═══════════════════════════════════════════════════════════
   ANNOTATOR
   ═══════════════════════════════════════════════════════════ */
.annotator-section {

.ann-cat-option:hover, .ann-cat-option.ann-cat-focused { background: var(--c-bg-warm); }
.ann-cat-option .aco-code { font-weight: 600; color: var(--c-text); flex-shrink: 0; }
.ann-cat-option .aco-name { color: var(--c-text-secondary); }
.ann-cat-option .aco-count {

/* Resume button */

}

.annotator-counter {

.annotator-progress-bar {

}

.ann-btn {

.annotator-img-wrap {

.ann-draw-brush-wrap {

.annotator-img-meta { width: 100%; text-align: center; }
.annotator-img-code {

  letter-spacing: 0.06em;
}
.annotator-img-name {

  font-size: 1.5rem;
  font-weight: 600;
  margin-top: 0.15rem;

}
.ann-meta-group {

}
.annotator-img-group {

}

.annotator-panel {
  background: var(--c-bg-card);

  overflow: hidden;

.ann-section {

}

.ann-section-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;

.ann-section-label .ann-hint {

.ann-tags {

/* Placement cards: always show pre-rendered canvas, hide cropped thumb */

#ann-tag-tooltip .att-imgs {

#ann-tag-tooltip .att-imgs img {

#ann-tag-tooltip .att-img-label {

.ann-tag.sel-where     { background: #27AE60; color: #fff; border-color: #27AE60; }

.ann-tag.sel-secondary { background: #2980B9; color: #fff; border-color: #2980B9; }

.ann-macro-tabs {
  display: flex;

.ann-macro-tab {

  font-size: 0.62rem;
  padding: 0.18rem 0.45rem;
  border: 1px solid var(--c-border);
  border-radius: 2px;
  background: var(--c-bg-warm);
  color: var(--c-text-secondary);
  cursor: pointer;
  transition: all 0.1s;
}
.ann-macro-tab:hover { background: var(--c-border); }
.ann-macro-tab.active { background: var(--c-text); color: #fff; border-color: var(--c-text); }
.ann-save-bar {

.ann-json-preview {

.ann-json-preview summary {

  font-size: 0.68rem;

.ann-json-preview pre {

  font-family: var(--font-mono);
  font-size: 0.68rem;

@media (max-width: 900px) {
  .annotator-body { grid-template-columns: 1fr; }

}
.ann-zoom-wrap {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  margin-left: auto;
  font-size: 0.8rem;
}
.ann-zoom-btn {
  background: var(--c-bg-card);
  border: 1px solid var(--c-border);
  border-radius: 3px;

#ann-data-modal {

/* ═══════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════ */
const BASE_URL = 'https://ptoire.github.io/kellogg-data/';
let INDEX_DATA = null;
let ANN_INDEX_DATA = null;
let ANN_SERVER_KELLOGG = null; // kellogg data fetched from server/JSON, bypasses localStorage on READONLY
let ANIM_CACHE = {};
let cardAnimFrames = {};

/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
async function init() {
  try {
    const resp = await fetch(BASE_URL + 'data/index.json');
    INDEX_DATA = await resp.json();
  } catch(e) {
    document.getElementById('main').innerHTML =
      '<p style="padding:2rem;color:red;">Error loading data. Ensure data/index.json exists.</p>';
    return;
  }
  try {
    const r2 = await fetch(BASE_URL + 'data/annotator_index.json');
    ANN_INDEX_DATA = await r2.json();
  } catch(e) {
    ANN_INDEX_DATA = null;
  }
  // Load persisted annotations:
  // - localhost: from server API (which reads annotations_local.json)
  // - public: fetch annotations_local.json directly as static file
  try {
    const annotUrl = READONLY
      ? BASE_URL + 'data/annotations_local.json?v=' + Date.now()
      : '/api/annotations';
    const r3 = await fetch(annotUrl, { cache: 'no-store' });
    if (r3.ok) {
      const srv = await r3.json();
      if (srv.maurer) {
        const loc = JSON.parse(localStorage.getItem('maurer_annotations') || '{}');
        localStorage.setItem('maurer_annotations', JSON.stringify({...srv.maurer, ...loc}));
      }
      if (srv.kellogg) {
        ANN_SERVER_KELLOGG = srv.kellogg; // keep a direct reference (for READONLY, bypasses localStorage)
        const loc = JSON.parse(localStorage.getItem(ANN_KEY) || '{}');
        localStorage.setItem(ANN_KEY, JSON.stringify({...srv.kellogg, ...loc}));
      }
    }
  } catch(e) {}
  buildNav();
  buildGrid();
  // K-B: pre-render full-page blurred previews (needs layout to be settled)
  requestAnimationFrame(() => requestAnimationFrame(initPlacementPreviews));
  buildAnnotatorSection();
  buildArchiveSection();
  buildISStudioSection();
  buildMaurerAnnotationSection();
  buildBand3Section();
  buildFooter();
}

/* ═══════════════════════════════════════════════════════════
   KELLOGG GRID
   ═══════════════════════════════════════════════════════════ */
function buildGrid() {
  const main = document.getElementById('main');
  const sessionMap = {};
  INDEX_DATA.sessions.forEach(s => { sessionMap[s.code] = s; });

  GROUP_ORDER.forEach(groupName => {
    const letter = GROUP_LETTERS[groupName];
    const prefix = `K-${letter}`;
    const taxItems = FULL_TAXONOMY[prefix];
    const section = document.createElement('section');
    section.className = 'group-section';
    section.id = `group-${letter}`;

    const present = Object.keys(taxItems).filter(n => sessionMap[`${prefix}-${n}`]);
    section.innerHTML = `
      <div class="group-header">
        <span class="group-letter">${letter}</span>
        <span class="group-name">${groupName}</span>
        <span class="group-count">${present.length} / ${Object.keys(taxItems).length} recorded</span>
      </div>
    `;

    const grid = document.createElement('div');
    grid.className = 'card-grid';

    Object.entries(taxItems).sort((a, b) => parseInt(a[0]) - parseInt(b[0])).forEach(([num, name]) => {
      const code = `${prefix}-${num}`;
      const session = sessionMap[code];
      const card = document.createElement('div');

      if (session) {
        card.className = 'card' + (prefix === 'K-B' ? ' card--placement' : '');
        const wrapStyle = (prefix === 'K-B' && session.canvas_w && session.canvas_h)
          ? ` style="padding-top:${(session.canvas_h / session.canvas_w * 100).toFixed(2)}%"`
          : '';
        card.innerHTML = `
          <div class="card-canvas-wrap"${wrapStyle}>
            <img src="${BASE_URL}img/${session.session_id}_thumb.png" alt="${name}" loading="lazy">
            <canvas data-sid="${session.session_id}"
                    data-canvas-w="${session.canvas_w || 1580}"
                    data-canvas-h="${session.canvas_h || 1009}"
                    data-offset-x="${session.crop_offset_x || 0}"
                    data-offset-y="${session.crop_offset_y || 0}"></canvas>
          </div>
          <div class="card-info">
            <div class="card-code">${code}</div>
            <div class="card-name">${name}</div>
            <div class="card-stats">${session.total_strokes} stroke${session.total_strokes!==1?'s':''} · ${session.total_points} points</div>
          </div>
        `;
        card.onclick = () => openDetail(session);
        card.onmouseenter = () => startCardAnim(card, session);
        card.onmouseleave = () => stopCardAnim(card);
      } else {
        card.className = 'card missing';
        card.innerHTML = `
          <div class="card-canvas-wrap"></div>
          <div class="card-info">
            <div class="card-code">${code}</div>
            <div class="card-name">${name}</div>
            <div class="card-stats">not recorded</div>
          </div>
        `;
      }
      grid.appendChild(card);
    });
    section.appendChild(grid);
    main.appendChild(section);
  });
}

/* ═══════════════════════════════════════════════════════════
   CARD ANIMATION
   ═══════════════════════════════════════════════════════════ */

// Draw ALL strokes as real black lines at full-page scale (static preview for K-B cards).
// Coordinates in anim are relative to the crop bounding box; we shift by crop_offset
// to place the drawing at its true position within the full page.
function renderPlacementStatic(canvas, anim) {
  const wrap = canvas.parentElement;
  const pageW  = parseInt(canvas.dataset.canvasW) || 1580;
  const pageH  = parseInt(canvas.dataset.canvasH) || 1009;
  const offX   = parseInt(canvas.dataset.offsetX)  || 0;
  const offY   = parseInt(canvas.dataset.offsetY)  || 0;

  // Wrapper = full page aspect ratio so empty page areas stay visible
  wrap.style.paddingTop = (pageH / pageW * 100).toFixed(2) + '%';

  const rect = wrap.getBoundingClientRect();
  if (!rect.width) return;
  canvas.width  = Math.round(rect.width * 2);
  canvas.height = Math.round(canvas.width * pageH / pageW);

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Single uniform scale over the full page
  const scale = canvas.width / pageW;

  ctx.filter = 'none';
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  anim.strokes.forEach(stroke => {
    ctx.beginPath();
    let started = false;
    for (const p of stroke) {
      const px = (p.x + offX) * scale;
      const py = (p.y + offY) * scale;
      if (!started) { ctx.moveTo(px, py); started = true; }
      else { ctx.lineTo(px, py); }
    }
    if (started) ctx.stroke();
  });
}

// Fetch anim data for every K-B card and render static full-page preview
async function initPlacementPreviews() {
  for (const card of document.querySelectorAll('.card--placement')) {
    const canvas = card.querySelector('canvas');
    if (!canvas) continue;
    const sid = canvas.dataset.sid;
    if (!sid) continue;
    if (!ANIM_CACHE[sid]) {
      try {
        const resp = await fetch(BASE_URL + `data/${sid}_anim.json`);
        if (!resp.ok) continue;
        ANIM_CACHE[sid] = await resp.json();
      } catch(e) { continue; }
    }
    renderPlacementStatic(canvas, ANIM_CACHE[sid]);
  }
}

async function startCardAnim(card, session) {
  const canvas = card.querySelector('canvas');
  if (!canvas) return;
  const sid = session.session_id;
  if (!ANIM_CACHE[sid]) {
    try {
      const resp = await fetch(BASE_URL + `data/${sid}_anim.json`);
      ANIM_CACHE[sid] = await resp.json();
    } catch(e) { return; }
  }
  const anim = ANIM_CACHE[sid];
  const isPlacement = session.code && session.code.startsWith('K-B');
  const wrap = canvas.parentElement;
  const rect = wrap.getBoundingClientRect();

  // Full-page dimensions and crop offset for correct placement positioning
  const pageW = session.canvas_w || 1580;
  const pageH = session.canvas_h || 1009;
  const offX  = session.crop_offset_x || 0;
  const offY  = session.crop_offset_y || 0;

  if (isPlacement) {
    canvas.width  = Math.round(rect.width * 2);
    canvas.height = Math.round(canvas.width * pageH / pageW);
  } else {
    canvas.width  = rect.width * 2;
    canvas.height = rect.height * 2;
  }
  const ctx = canvas.getContext('2d');
  const allPts = [];
  anim.strokes.forEach(s => s.forEach(p => allPts.push(p)));
  if (allPts.length < 2) return;
  const tStart = allPts[0].t, tEnd = allPts[allPts.length-1].t;
  const duration = tEnd - tStart;
  const animDuration = 2000;

  // For placement: single scale over full page + apply crop offset
  const scale = isPlacement ? (canvas.width / pageW) : null;
  const scaleX = isPlacement ? scale : (canvas.width  / anim.w);
  const scaleY = isPlacement ? scale : (canvas.height / anim.h);

  let startTime = performance.now();
  let animId;
  function drawFrame(now) {
    const progress = Math.min(1, (now - startTime) / animDuration);
    const tCurrent = tStart + progress * duration;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (isPlacement) {
      ctx.filter = 'blur(18px)';
      ctx.strokeStyle = 'rgba(50, 70, 200, 0.6)';
      ctx.lineWidth = 28;
    } else {
      ctx.filter = 'none';
      ctx.strokeStyle = '#C0392B';
      ctx.lineWidth = 3;
    }
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    anim.strokes.forEach(stroke => {
      let started = false; ctx.beginPath();
      for (const p of stroke) {
        if (p.t > tCurrent) break;
        const px = isPlacement ? (p.x + offX) * scale : p.x * scaleX;
        const py = isPlacement ? (p.y + offY) * scale : p.y * scaleY;
        if (!started) { ctx.moveTo(px, py); started = true; }
        else { ctx.lineTo(px, py); }
      }
      if (started) ctx.stroke();
    });
    if (progress < 1) { animId = requestAnimationFrame(drawFrame); }
    else { setTimeout(() => { if (cardAnimFrames[sid]) { startTime = performance.now(); animId = requestAnimationFrame(drawFrame); cardAnimFrames[sid] = animId; } }, 800); }
    cardAnimFrames[sid] = animId;
  }
  animId = requestAnimationFrame(drawFrame);
  cardAnimFrames[sid] = animId;
}

function stopCardAnim(card) {
  const canvas = card.querySelector('canvas');
  if (!canvas) return;
  const sid = canvas.dataset.sid;
  if (cardAnimFrames[sid]) { cancelAnimationFrame(cardAnimFrames[sid]); delete cardAnimFrames[sid]; }
  if (card.classList.contains('card--placement') && ANIM_CACHE[sid]) {
    renderPlacementStatic(canvas, ANIM_CACHE[sid]);
  } else {
    const ctx = canvas.getContext('2d');
    if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

/* ═══════════════════════════════════════════════════════════
   MAURER AUTO-FILL
   Infer Band 3 codes from Kellogg taxonomy code.
   Only high-confidence mappings are included.
   ═══════════════════════════════════════════════════════════ */
function getMaurerAutoFill(code) {
  const D = '\u2013'; // en-dash used in Band 3 codes
  const result = [`T${D}DAA`, `T${D}EAA`]; // always: monochromatic, pen execution
  const parts = code.split('-');
  const group = parts.slice(0, 2).join('-'); // e.g. "K-B"
  const num   = parts[2] || '';              // e.g. "05"
  if (group === 'K-B') result.push(`T${D}CBA`);  // Placement Pattern
  if (group === 'K-G') result.push(`T${D}ADEC`); // Mandalas
  if (group === 'K-H') result.push(`T${D}AEI`);  // Suns → central body + radial extensions
  if (group === 'K-I') result.push(`T${D}AEE`);  // Radials → early radial arrangements
  if (group === 'K-A') {
    if (num === '01') result.push(`T${D}ACAC`);                          // Dot
    if (['02','03','04'].includes(num)) result.push(`T${D}ACAB`);        // Straight lines
    if (num === '05') result.push(`T${D}ACAA`);                          // Curved line
    if (num === '12') result.push(`T${D}ACADA`);                         // Zigzag/wavy
    if (num === '15') result.push(`T${D}ACAE`);                          // Spiral
  }
  if (group === 'K-D') {
    if (num === '02') result.push(`T${D}ACBCC`);  // Square/Rectangle → Rectangle
    if (num === '03') result.push(`T${D}ACBBA`);  // Circle/Oval → round closed form
    if (num === '04') result.push(`T${D}ACBCE`);  // Triangle
  }
  return result;
}

        <div class="info-row"><span class="info-label">Crop Size</span><span class="info-value">${session.crop_w} × ${session.crop_h} px</span></div>
        <div class="info-row"><span class="info-label">Recorded</span><span class="info-value">${new Date(session.timestamp).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</span></div>
        ${anim ? `<div class="info-row"><span class="info-label">Duration</span><span class="info-value">${getDuration(anim)}s</span></div>` : ''}
        <h3>Maurer Band 3</h3>
        <div class="maurer-carousel-nav">
          <button class="maurer-nav-btn" onclick="maurerNavShift(-1)">&#x2039;</button>
          <span class="maurer-carousel-label" id="maurer-group-label"></span>
          <button class="maurer-nav-btn" onclick="maurerNavShift(1)">&#x203a;</button>
        </div>
        <div class="maurer-tags" id="detail-maurer-tags"></div>
      </div>
    </div>
  `;

  detailMaurerSid = sid;
  detailMaurerGroupIdx = BAND3_GROUPS.findIndex(g => g.code === 'T\u2013C');
  if (detailMaurerGroupIdx < 0) detailMaurerGroupIdx = 0;
  // Auto-fill inferrable categories on first open
  if (getMaurerForSession(sid).length === 0) {
    const fill = getMaurerAutoFill(session.code);
    if (fill.length) saveMaurerForSession(sid, fill);
  }
  buildMaurerCarouselGroup(sid, detailMaurerGroupIdx);

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';

}

function closeDetail() {
  stopDetailAnim();
  document.getElementById('overlay').classList.remove('active');
  document.body.style.overflow = '';
}

function getDuration(anim) {
  let tMin = Infinity, tMax = -Infinity;
  anim.strokes.forEach(s => s.forEach(p => { if(p.t<tMin)tMin=p.t; if(p.t>tMax)tMax=p.t; }));
  return (tMax - tMin).toFixed(1);
}

function drawStaticOnCanvas(anim) {
  const canvas = document.getElementById('detail-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const scaleX = canvas.width / anim.w;
  const scaleY = canvas.height / anim.h;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#1A1A1E'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  anim.strokes.forEach(stroke => {
    if (stroke.length < 2) return;
    ctx.beginPath(); ctx.moveTo(stroke[0].x * scaleX, stroke[0].y * scaleY);
    for (let i = 1; i < stroke.length; i++) ctx.lineTo(stroke[i].x * scaleX, stroke[i].y * scaleY);
    ctx.stroke();
  });
}

let detailAnimId = null, detailPlaying = false;

function toggleDetailAnim() {
  if (detailPlaying) { stopDetailAnim(); return; }
  const canvas = document.getElementById('detail-canvas');
  if (!canvas) return;
  const codeEl = document.querySelector('.detail-code');
  if (!codeEl) return;
  const session = INDEX_DATA.sessions.find(s => s.code === codeEl.textContent);
  if (!session) return;
  const anim = ANIM_CACHE[session.session_id];
  if (!anim) return;
  const ctx = canvas.getContext('2d');
  const allPts = [];
  anim.strokes.forEach(s => s.forEach(p => allPts.push(p)));
  if (allPts.length < 2) return;
  const tStart = allPts[0].t, tEnd = allPts[allPts.length-1].t;
  const duration = tEnd - tStart;
  const animDuration = Math.max(2000, duration * 400);
  let startTime = performance.now();
  detailPlaying = true;
  document.getElementById('btn-play').textContent = '⏸ Pause';
  document.getElementById('btn-play').classList.add('active');
  const scaleX = canvas.width / anim.w;
  const scaleY = canvas.height / anim.h;
  function drawFrame(now) {
    const progress = Math.min(1, (now - startTime) / animDuration);
    const tCurrent = tStart + progress * duration;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    anim.strokes.forEach(stroke => {
      let started = false, isActive = false; ctx.beginPath();
      for (const p of stroke) {
        if (p.t > tCurrent) { isActive = true; break; }
        if (!started) { ctx.moveTo(p.x * scaleX, p.y * scaleY); started = true; } else { ctx.lineTo(p.x * scaleX, p.y * scaleY); }
      }
      if (started) { ctx.strokeStyle = isActive ? '#C0392B' : '#1A1A1E'; ctx.stroke(); }
    });
    document.getElementById('anim-progress').textContent = `${Math.round(progress*100)}%`;
    if (progress < 1) { detailAnimId = requestAnimationFrame(drawFrame); }
    else { detailPlaying = false; document.getElementById('btn-play').textContent = '▶ Play'; document.getElementById('btn-play').classList.remove('active'); }
  }
  detailAnimId = requestAnimationFrame(drawFrame);
}

function stopDetailAnim() {
  if (detailAnimId) cancelAnimationFrame(detailAnimId);
  detailAnimId = null; detailPlaying = false;
  const btn = document.getElementById('btn-play');
  if (btn) { btn.textContent = '▶ Play'; btn.classList.remove('active'); }
}

function resetDetailAnim() {
  stopDetailAnim();
  const codeEl = document.querySelector('.detail-code');
  if (!codeEl) return;
  const session = INDEX_DATA.sessions.find(s => s.code === codeEl.textContent);
  if (session && ANIM_CACHE[session.session_id]) drawStaticOnCanvas(ANIM_CACHE[session.session_id]);
  document.getElementById('anim-progress').textContent = '0%';
}

   ANNOTATOR
   ═══════════════════════════════════════════════════════════ */
const ANN_KEY = 'kellogg_full_annotations';
const READONLY = !['localhost', '127.0.0.1'].includes(location.hostname);
let annIdx = 0;
let annItems = [];  // items from annotator_index.json

const ANN_GROUP_NAMES = { A:'Basic', B:'Placement', C:'Emergent', D:'Diagrams', E:'Combines', F:'Aggregates', G:'Mandalas', H:'Suns', I:'Radials' };
const ANN_NON_B = ['A','C','D','E','F','G','H','I'];

function taxEntries(prefix) {
  return Object.entries(ANN_TAXONOMY[prefix] || {})
    .filter(([code, name]) => name !== code) // exclude placeholders (no real name yet)
    .sort((a, b) => a[0].localeCompare(b[0]));
}

function annStore() {
  // On READONLY (public page), bypass localStorage and use the directly-fetched JSON data.
  // This avoids issues when browsers block localStorage on third-party origins.
  if (READONLY && ANN_SERVER_KELLOGG) return ANN_SERVER_KELLOGG;
  try { return JSON.parse(localStorage.getItem(ANN_KEY) || '{}'); } catch { return {}; }
}
function annStoreSet(s) {
  if (READONLY) return;
  try { localStorage.setItem(ANN_KEY, JSON.stringify(s)); } catch {}
  postAnnotationsToServer();
}
function postAnnotationsToServer() {
  try {
    const maurer  = JSON.parse(localStorage.getItem('maurer_annotations') || '{}');
    const kellogg = JSON.parse(localStorage.getItem(ANN_KEY) || '{}');
    fetch('/api/annotations', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({maurer, kellogg})
    }).catch(() => {});
  } catch {}
}

function annGet(sha) {
  const ls = annStore()[sha];
  if (ls) return ls;
  const item = annItems.find(i => i.sha === sha);
  if (item) return {
    human_where:     item.human_where     || [],
    human_secondary: item.human_secondary || [],
    maurer_tc:       item.maurer_tc       || [],
    status:          item.status          || 'seeded_unconfirmed',
    updated_at:      item.updated_at      || null,
  };
  return { human_where:[], human_secondary:[], maurer_tc:[], status:'unconfirmed', updated_at:null };
}

function annSet(sha, data) {
  const store = annStore();
  store[sha] = { ...data, updated_at: new Date().toISOString() };
  annStoreSet(store);
}

function annCountDone() {
  const store = annStore();
  return annItems.filter(item => {
    const a = store[item.sha] || item;
    return a.human_where?.length || a.human_secondary?.length || a.maurer_tc?.length;
  }).length;
}

function exportAnnotationsJSON() {
  const store = annStore();
  const out = annItems.map(item => {
    const a = store[item.sha] || item;
    return {
      sha:             item.sha,
      img_url:         item.img_url,
      prefill_labels:  item.prefill_labels,
      human_where:     a.human_where     || [],
      human_primary:   item.prefill_labels,
      human_secondary: a.human_secondary || [],
      maurer_tc:       a.maurer_tc       || [],
      status:          a.status          || 'unconfirmed',
      updated_at:      a.updated_at      || null,
    };
  });
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const el = document.createElement('a');
  el.href = url; el.download = 'kellogg_annotations.json';
  document.body.appendChild(el); el.click();
  document.body.removeChild(el);
  URL.revokeObjectURL(url);
}

/* ── Annotator tag hover tooltip ────────────────────────────────────────── */
let ANN_PREFILL_INDEX = {};   // code → [annItem, ...]
let ANN_TO_SESSION = {};      // annCode → exact catalog session (e.g. "K-CC" → session K-C-03)

// K-A is special: letters skip J, so hardcode the mapping
const K_A_SESS_MAP = {
  'K-ACA':'K-A-01','K-ACB':'K-A-02','K-ACC':'K-A-03','K-ACD':'K-A-04',
  'K-ACE':'K-A-05','K-ACF':'K-A-06','K-ACG':'K-A-07','K-ACH':'K-A-08',
  'K-ACI':'K-A-09','K-ACK':'K-A-10','K-ACL':'K-A-11','K-ACM':'K-A-12',
  'K-ACN':'K-A-13','K-ACO':'K-A-14','K-ACP':'K-A-15','K-ACQ':'K-A-16',
  'K-ACR':'K-A-17','K-ACS':'K-A-18',
};

function annCodeToSessionCode(annCode) {
  if (annCode.startsWith('K-A')) return K_A_SESS_MAP[annCode] || null;
  const group = annCode.substring(0, 3);
  const lastLetter = annCode[annCode.length - 1];
  const pos = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.indexOf(lastLetter);
  if (pos < 0) return null;
  return `${group}-${String(pos + 1).padStart(2, '0')}`;
}

function buildAnnHoverIndices() {
  ANN_PREFILL_INDEX = {};
  annItems.forEach(item => {
    (item.prefill_labels || []).forEach(code => {
      (ANN_PREFILL_INDEX[code] = ANN_PREFILL_INDEX[code] || []).push(item);
    });
  });
  // Build exact ANN code → catalog session map
  ANN_TO_SESSION = {};
  const sessionByCode = {};
  (INDEX_DATA?.sessions || []).forEach(s => { sessionByCode[s.code] = s; });
  Object.keys(ANN_TAXONOMY).forEach(group => {
    Object.keys(ANN_TAXONOMY[group]).forEach(annCode => {
      const sc = annCodeToSessionCode(annCode);
      if (sc && sessionByCode[sc]) ANN_TO_SESSION[annCode] = sessionByCode[sc];
    });
  });
}

  archiveSelected.clear();
  document.querySelectorAll('#archive-section .arch-btn').forEach(b => b.classList.remove('active'));
  const count = document.getElementById('arch-count');
  if (count) count.textContent = '';
  archiveRender();
}

function archiveRender() {
  const grid = document.getElementById('arch-grid');
  if (!grid) return;
  if (!archiveSelected.size) {
    grid.innerHTML = '<div class="arch-empty">Select one or more categories above to browse images.</div>';
    return;
  }
  const sel = [...archiveSelected];
  const store = annStore();
  const results = [];
  (annItems || []).forEach(item => {
    const rec = store[item.sha] || {};
    // Labels from two sources
    const prefillSet = new Set(item.prefill_labels || []);
    const manualSet  = new Set([...(rec.human_secondary || []), ...(rec.human_where || [])]);
    // Only show if at least one selected category appears in either source
    const matchPrefill = sel.some(c => prefillSet.has(c));
    const matchManual  = sel.some(c => manualSet.has(c));
    if (matchPrefill || matchManual) {
      results.push({ item, prefillSet, manualSet });
    }
  });
  if (!results.length) {
    grid.innerHTML = '<div class="arch-empty">No images found for the selected categories.</div>';
    return;
  }
  grid.innerHTML = results.map(({ item, prefillSet, manualSet }) => {
    // Build chip list: manual first (highlighted), then prefill-only
    const allCodes = new Set([...manualSet, ...prefillSet]);
    const chips = [...allCodes].sort().map(code => {
      const isManual  = manualSet.has(code);
      const isPrefill = prefillSet.has(code);
      const matchCls  = archiveSelected.has(code) ? ' match' : '';
      const srcCls    = isManual ? ' arch-chip-manual' : ' arch-chip-prefill';
      return `<span class="arch-chip${matchCls}${srcCls}" data-code="${code}"
        onmouseenter="annTagHoverOn(event,this)" onmouseleave="annTagHoverOff()">${code}</span>`;
    }).join('');
    // Source badge
    const hasManual  = manualSet.size > 0;
    const hasPrefill = prefillSet.size > 0;
    let sourceBadge = '';
    if (hasManual && hasPrefill) {
      sourceBadge = `<div class="arch-source"><span class="arch-src-manual">manually annotated</span> + <span class="arch-src-prefill">Kellogg</span></div>`;
    } else if (hasManual) {
      sourceBadge = `<div class="arch-source"><span class="arch-src-manual">manually annotated</span></div>`;
    } else {
      sourceBadge = `<div class="arch-source"><span class="arch-src-prefill">pre-classified by Rhoda Kellogg</span></div>`;
    }
    const pathShort = (item.orig_path || item.sha.substring(0, 12) + '…').split('/').pop();
    return `<div class="arch-card">
      <img src="${BASE_URL}${item.img_url}" alt="" loading="lazy">
      <div class="arch-card-meta">
        <div class="arch-card-path" title="${item.orig_path || ''}">${pathShort}</div>
        ${sourceBadge}
        <div class="arch-chips">${chips}</div>
      </div>
    </div>`;
  }).join('');
}
